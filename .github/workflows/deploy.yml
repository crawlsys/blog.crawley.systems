name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    # Shared org ARC runner (crawlsys-linux scale set on cloudy-k3s, defined in
    # crawlsys/homelab argo/charts/arc-runners). CF API token is IP-restricted
    # to the home network, so GitHub-hosted runners get "Cannot use the access
    # token from location" errors. Repo transferred kvncrw -> crawlsys
    # 2026-07-11 precisely so it can use this shared runner; the dedicated
    # kvncrw-crawley-systems scale set was removed the same day.
    runs-on: crawlsys-linux
    environment:
      name: production
      url: https://blog.crawley.systems
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=blog-crawley-systems --branch=main --commit-dirty=true
