    - heading "Turning Honeypot Noise into PentAGI Investigations" [level=1] [ref=f3e19]
    - paragraph [ref=f3e20]: A small FTP daemon collects the scanner traffic, a watcher turns new IPs into bounded PentAGI flows, and a local Qwen3-Coder model on an RTX 5090 handles the routine investigation work.
  - article [ref=f3e21]:
    - generic [ref=f3e22]:
      - paragraph [ref=f3e23]: What should happen after a random scanner touches your honeypot? Most of the time you get an IP address, maybe a timestamp, and a small reminder that the internet is always knocking on the cheapest door it can find.
      - paragraph [ref=f3e24]:
        - text: "I wanted that signal to turn into a small, repeatable investigation without building another dashboard that I would eventually ignore. The result is a simple pipeline: an FTP honeypot records public source IPs, a watcher daemon turns new entries into"
        - link "PentAGI" [ref=f3e25] [cursor=pointer]:
          - /url: https://pentagi.com
        - text: flows, and PentAGI runs bounded defensive reconnaissance through a local model provider.
      - paragraph [ref=f3e26]:
        - text: If you have not run into it yet,
        - link "PentAGI" [ref=f3e27] [cursor=pointer]:
          - /url: https://pentagi.com
        - text: is an open-source autonomous security-testing platform from
        - link "vxcontrol" [ref=f3e28] [cursor=pointer]:
          - /url: https://github.com/vxcontrol/pentagi
        - text: . Think of it as a multi-agent pentest workspace with a web UI, flow API, isolated scanner containers, provider routing, and memory/search integrations. You can start from the hosted docs at
        - link "pentagi.com" [ref=f3e29] [cursor=pointer]:
          - /url: https://pentagi.com
        - text: or clone the
        - link "GitHub repo" [ref=f3e30] [cursor=pointer]:
          - /url: https://github.com/vxcontrol/pentagi
        - text: .
      - paragraph [ref=f3e31]:
        - text: The full publishable code is available in
        - link "kvncrw/pentagi-honeypot-bridge" [ref=f3e32] [cursor=pointer]:
          - /url: https://github.com/kvncrw/pentagi-honeypot-bridge
        - text: . The repo contains the daemon, the PentAGI watcher, systemd units, runit scripts, and a few focused tests so you can read the whole thing without reverse-engineering my homelab.
      - figure "PentAGI is the analyst side of this setup. The edge daemon only needs the API URL and a dedicated token." [ref=f3e33]:
        - img "PentAGI login page shown in dark mode." [ref=f3e34]
      - heading "What We Are Building" [level=2] [ref=f3e36]
      - paragraph [ref=f3e37]: There are two parts to this system, and the separation is important because each part has a very different job.
      - paragraph [ref=f3e38]:
        - text: On the edge host,
        - code [ref=f3e39]: honeypotd.py
        - text: listens on FTP and records public source IPs. The same process exposes
        - code [ref=f3e40]: /blocked.json
        - text: on port
        - code [ref=f3e41]: "9001"
        - text: ", including first-seen time, last-seen time, hit count, reasons, and attempted usernames. It does not store passwords."
      - paragraph [ref=f3e42]:
        - text: Next to it,
        - code [ref=f3e43]: pentagi_watcher.py
        - text: polls that JSON endpoint. For each new IP inside the configured age window, the watcher checks how many PentAGI flows are already active and only creates more work when capacity is available.
      - paragraph [ref=f3e44]:
        - link "PentAGI" [ref=f3e45] [cursor=pointer]:
          - /url: https://github.com/vxcontrol/pentagi
        - text: runs in Kubernetes. In my homelab it is deployed with ArgoCD, Postgres/pgvector, Graphiti, Neo4j, a scraper service, and a DinD sidecar that launches scanner containers with tools like
        - code [ref=f3e46]: nmap
        - text: ","
        - code [ref=f3e47]: curl
        - text: ","
        - code [ref=f3e48]: jq
        - text: ","
        - code [ref=f3e49]: traceroute
        - text: ","
        - code [ref=f3e50]: whois
        - text: ", and"
        - code [ref=f3e51]: dig
        - text: .
      - code [ref=f3e53]:
        - generic [ref=f3e54]: pipeline
        - text: "internet scanner -> ftp honeypot on :21 -> /blocked.json on 127.0.0.1:9001 -> pentagi_watcher.py -> PentAGI createFlow(modelProvider: \"custom\") -> scanner container -> short defensive recon summary"
      - paragraph [ref=f3e55]: The honeypot does not need to know anything about PentAGI, Kubernetes, GraphQL, or whichever model is currently doing the analysis. It emits a small JSON document, and the watcher becomes the only integration point between the exposed service and the analysis platform.
      - figure "The watcher turns each new honeypot hit into a bounded PentAGI flow. The targets are redacted here because the UI is showing live homelab data." [ref=f3e56]:
        - img "PentAGI flows table in dark mode with redacted honeypot targets." [ref=f3e57]
      - heading "Install the Honeypot Daemon" [level=2] [ref=f3e59]
      - paragraph [ref=f3e60]: Start on the host that will receive the bait traffic. This can be a tiny edge host, a small VM, or any system where you are comfortable exposing a fake FTP service to the network you control.
      - code [ref=f3e62]:
        - generic [ref=f3e63]: install
        - text: git clone https://github.com/kvncrw/pentagi-honeypot-bridge.git cd pentagi-honeypot-bridge sudo useradd --system --home /var/lib/pentagi-honeypot --shell /usr/sbin/nologin honeypot sudo mkdir -p /opt/pentagi-honeypot-bridge /var/lib/pentagi-honeypot /etc/pentagi-honeypot sudo cp honeypotd.py pentagi_watcher.py /opt/pentagi-honeypot-bridge/ sudo chown -R honeypot:honeypot /var/lib/pentagi-honeypot
      - paragraph [ref=f3e64]:
        - text: For the first smoke test, bind FTP to
        - code [ref=f3e65]: "2121"
        - text: instead of privileged port
        - code [ref=f3e66]: "21"
        - text: . The daemon ignores loopback, RFC1918, link-local, and unique-local IPv6 ranges by default; clear the ignore list for this local test so
        - code [ref=f3e67]: 127.0.0.1
        - text: shows up in the feed.
      - code [ref=f3e69]:
        - generic [ref=f3e70]: local test
        - text: HONEYPOT_FTP_PORT=2121 \ HONEYPOT_STATE_FILE=/tmp/honeypot-blocked.json \ HONEYPOT_IGNORE_CIDRS= \ python3 honeypotd.py
      - paragraph [ref=f3e71]: "Now touch the service from another shell and check the JSON output:"
      - code [ref=f3e73]:
        - generic [ref=f3e74]: touch the trap
        - text: printf 'USER admin\r\nPASS admin\r\nQUIT\r\n' | nc 127.0.0.1 2121 curl http://127.0.0.1:9001/blocked.json
      - paragraph [ref=f3e75]: "The feed should look like this:"
      - code [ref=f3e77]:
        - generic [ref=f3e78]: blocked.json
        - text: "{ \"generated_at\": \"2026-04-28T12:00:00Z\", \"count\": 1, \"blocked\": [ { \"ip\": \"203.0.113.10\", \"first_seen\": \"2026-04-28T11:58:12Z\", \"last_seen\": \"2026-04-28T11:58:20Z\", \"hits\": 3, \"reasons\": [\"ftp-connect\", \"ftp-user\", \"ftp-pass\"], \"usernames\": [\"admin\"] } ] }"
      - paragraph [ref=f3e79]: The important code path is also small enough to reason about quickly. Every connection marks the source IP, selected FTP commands update the reason list, and password values are deliberately ignored.
      - code [ref=f3e81]:
        - generic [ref=f3e82]: honeypotd.py
        - text: "def handle(self) -> None: peer_ip = self.client_address[0] self.store.mark(peer_ip, \"ftp-connect\") self.write_line(self.banner) while True: raw = self.rfile.readline(1024) if not raw: return command, _, value = raw.decode(errors=\"replace\").strip().partition(\" \") command = command.upper() if command == \"USER\": self.store.mark(peer_ip, \"ftp-user\", value or None) self.write_line(\"331 Password required\") elif command == \"PASS\": self.store.mark(peer_ip, \"ftp-pass\") self.write_line(\"530 Login incorrect\")"
      - paragraph [ref=f3e83]: "On a systemd host, install the included service files and start the daemon:"
      - code [ref=f3e85]:
        - generic [ref=f3e86]: systemd
        - text: sudo cp systemd/*.service /etc/systemd/system/ sudo systemctl daemon-reload sudo systemctl enable --now honeypotd.service
      - paragraph [ref=f3e87]:
        - text: If you are using Void Linux or another runit host, the repo includes
        - code [ref=f3e88]: runit/honeypotd.run
        - text: and
        - code [ref=f3e89]: runit/pentagi-watcher.run
        - text: . My original edge deployment used runit for the host services and Kubernetes for PentAGI itself, which kept the exposed daemon independent from the cluster.
      - heading "Configure the PentAGI Watcher" [level=2] [ref=f3e90]
      - paragraph [ref=f3e91]:
        - text: "Create a dedicated PentAGI API token for the watcher. The exact UI can change over time, however the operational rule is stable: give the watcher only the access it needs to create and inspect flows, and treat token revocation as your first emergency brake. I am intentionally not repeating the full PentAGI install guide here; the upstream"
        - link "site" [ref=f3e92] [cursor=pointer]:
          - /url: https://pentagi.com
        - text: and
        - link "GitHub repo" [ref=f3e93] [cursor=pointer]:
          - /url: https://github.com/vxcontrol/pentagi
        - text: are better places for that.
      - paragraph [ref=f3e94]:
        - text: Put the watcher config in
        - code [ref=f3e95]: /etc/pentagi-honeypot/watcher.env
        - text: ":"
      - code [ref=f3e97]:
        - generic [ref=f3e98]: watcher.env
        - text: BLOCKED_URL=http://127.0.0.1:9001/blocked.json PENTAGI_URL=https://pentagi.example.com PENTAGI_TOKEN=replace-me PENTAGI_MODEL_PROVIDER=custom WATCHER_STATE_FILE=/var/lib/pentagi-honeypot/watcher-state.json MAX_ACTIVE_FLOWS=2 MAX_AGE_DAYS=7 STALE_FLOW_MINUTES=30 POLL_INTERVAL=120
      - paragraph [ref=f3e99]:
        - code [ref=f3e100]: PENTAGI_MODEL_PROVIDER=custom
        - text: is the key for the local-model path. In PentAGI, that custom provider points at an OpenAI-compatible vLLM endpoint inside the cluster, so the watcher does not need to know which model is serving the request.
      - paragraph [ref=f3e101]: "Start the watcher:"
      - code [ref=f3e103]:
        - generic [ref=f3e104]: start watcher
        - text: sudo systemctl enable --now pentagi-watcher.service journalctl -u honeypotd -u pentagi-watcher -f
      - paragraph [ref=f3e105]: The watcher is deliberately conservative. It loads durable state, skips already-seen IPs, ignores stale entries, asks PentAGI how many flows are active, and creates only as many new flows as the cap allows.
      - code [ref=f3e107]:
        - generic [ref=f3e108]: pentagi_watcher.py
        - text: "active = client.active_flow_count(timedelta(minutes=args.stale_flow_minutes)) slots = max(args.max_active_flows - active, 0) for _, ip in candidates[:slots]: prompt = build_prompt(ip, bool(args.abuseipdb_enabled)) flow = client.create_flow(args.model_provider, prompt) state[\"seen\"][ip] = utc_now().isoformat() LOG.info(\"created Pentagi flow %s for %s\", flow.get(\"id\"), ip)"
      - paragraph [ref=f3e109]: This active-flow cap came from a real failure. The first version counted the wrong statuses, created dozens of simultaneous flows, and proved that agent automation without backpressure can spend money faster than it creates useful information.
      - generic [ref=f3e110]:
        - generic [ref=f3e111]: Consumer Plan Caveat
        - paragraph [ref=f3e112]: Be careful wiring Claude Max or ChatGPT Pro into unattended PentAGI flows. This kind of automation can chew through usage fast, and people have had accounts TOS'd for running consumer seats like third-party agent backends. For anything long-running, use an API/commercial provider or a local model you control.
      - heading "The Flow Prompt" [level=2] [ref=f3e113]
      - paragraph [ref=f3e114]: The flow prompt should read like an operating procedure for defensive reconnaissance. You want ownership lookup, conservative service detection, and a short recommendation that helps you decide whether the source deserves a stronger block.
      - code [ref=f3e116]:
        - generic [ref=f3e117]: flow prompt shape
        - text: "Perform defensive reconnaissance on IP 203.0.113.10, which just touched our FTP honeypot. Rules: - Use direct scanner-container tooling. - Keep scans conservative. No exploitation, brute force, or credential attempts. Steps: 1. Run a bounded TCP connect scan against a small port set. 2. If ports are open, run service detection against only those ports. 3. Run WHOIS directly. 4. Run reverse DNS directly. 5. Run a short traceroute directly. 6. Check reputation only if a key is already configured. 7. Return a short threat summary and blocklist recommendation."
      - paragraph [ref=f3e118]:
        - text: An earlier version routed scanner traffic through Tor with
        - code [ref=f3e119]: proxychains4
        - text: ". That path is gone because it made the system worse: avoidable DNS failures, SOCKS failures, slower runs, and reports that were harder to trust. The current prompt keeps the work direct, conservative, and bounded inside the scanner container."
      - heading "Point PentAGI at the 5090" [level=2] [ref=f3e120]
      - paragraph [ref=f3e121]: "I started with the obvious provider path: use ChatGPT Pro through a local OpenAI-compatible bridge and let PentAGI call stronger models for every role. It worked, however a honeypot produces a lot of low-value events, and paying frontier-token prices to classify every random FTP hit is a poor default."
      - paragraph [ref=f3e122]: "So I asked Claude to help make the model decision like an operations decision. The prompt was not \"find the best model\"; it was closer to this:"
      - code [ref=f3e124]:
        - generic [ref=f3e125]: benchmark instruction
        - text: Inventory current coding/agent models that can realistically run on one RTX 5090 with 32 GB of VRAM. Reject anything that cannot fit with useful context. Build a PentAGI-specific benchmark using the same GraphQL flow creation path, the same scanner tools, and the same defensive recon tasks we expect from the honeypot pipeline. Compare ChatGPT Pro through the bridge against the best local vLLM candidate. Grade by task completion, valid tool calling, runtime, and operational cost.
      - paragraph [ref=f3e126]: That framing is important because generic benchmark numbers do not tell you whether PentAGI can call tools reliably, survive your context settings, or produce a useful security summary after a noisy scanner touches your infra.
      - paragraph [ref=f3e127]: "The fit check eliminated the giant MoE models immediately: GLM-5-class, Kimi-K2-class, DeepSeek V4-class, and the 480B Qwen coder variants all need far more VRAM than a single desktop card. The survivors were smaller Qwen and Devstral-class models, with Qwen3-Coder-30B-A3B looking like the best match for tool-heavy agent loops."
      - paragraph [ref=f3e128]:
        - text: The final vLLM deployment serves
        - code [ref=f3e129]: QuantTrio/Qwen3-Coder-30B-A3B-Instruct-AWQ
        - text: with the matching
        - code [ref=f3e130]: qwen3_coder
        - text: "tool parser:"
      - code [ref=f3e132]:
        - generic [ref=f3e133]: vllm values
        - text: "model: name: QuantTrio/Qwen3-Coder-30B-A3B-Instruct-AWQ maxModelLen: 65536 maxNumSeqs: 4 gpuMemoryUtilization: \"0.92\" quantization: awq_marlin enableAutoToolChoice: true toolCallParser: qwen3_coder"
      - paragraph [ref=f3e134]: "PentAGI's custom provider points at that in-cluster OpenAI-compatible endpoint:"
      - code [ref=f3e136]:
        - generic [ref=f3e137]: pentagi values
        - text: "LLM_SERVER_PROVIDER: \"\" LLM_SERVER_URL: \"http://vllm.vllm.svc.cluster.local:8000/v1\" LLM_SERVER_KEY: \"pentagi-internal-no-billing\" LLM_SERVER_CONFIG_PATH: \"/etc/pentagi/llm-config.yml\""
      - paragraph [ref=f3e138]:
        - text: The empty provider string is intentional. In this setup, a provider prefix like
        - code [ref=f3e139]: custom/gpt-5.4-mini
        - text: confused the OpenAI-compatible bridge, while leaving the provider blank let PentAGI send raw model names to the endpoint.
      - figure "The routine path is the custom provider backed by local vLLM. The paid model path stays available for human-initiated work, not unattended honeypot fan-out." [ref=f3e140]:
        - img "PentAGI providers page in dark mode showing OpenAI and custom local providers." [ref=f3e141]
      - heading "The Benchmark That Changed My Mind" [level=2] [ref=f3e143]
      - paragraph [ref=f3e144]: The first local-model run looked bad because Qwen emitted zero tool calls. That result looked like a model failure until the request logs showed it was really a configuration problem.
      - paragraph [ref=f3e145]:
        - text: Two settings were doing the damage. PentAGI's inherited role config had output budgets as high as the model context window, which left vLLM with no input budget and caused request validation failures. Sampling temperatures around
        - code [ref=f3e146]: "0.4"
        - text: to
        - code [ref=f3e147]: "0.7"
        - text: were also too high for reliable tool-call JSON from this model.
      - paragraph [ref=f3e148]:
        - text: Capping role outputs and dropping temperature to
        - code [ref=f3e149]: "0.1"
        - text: "fixed the tool-calling behavior. After that, the benchmark results became useful:"
      - table [ref=f3e150]:
        - rowgroup [ref=f3e151]:
          - row [ref=f3e152]:
            - columnheader "Provider" [ref=f3e153]
            - columnheader "Avg Duration" [ref=f3e154]
            - columnheader "Avg Tool Calls" [ref=f3e155]
            - columnheader "Grade" [ref=f3e156]
        - rowgroup [ref=f3e157]:
          - row [ref=f3e158]:
            - cell "ChatGPT Pro bridge" [ref=f3e159]
            - cell "208.0s" [ref=f3e160]
            - cell "1.0" [ref=f3e161]
            - cell "2.67 / 3" [ref=f3e162]
          - row [ref=f3e163]:
            - cell "Qwen3-Coder-30B on vLLM" [ref=f3e164]
            - cell "310.5s" [ref=f3e165]
            - cell "25.3" [ref=f3e166]
            - cell "3.00 / 3" [ref=f3e167]
      - paragraph [ref=f3e168]: "ChatGPT Pro behaved like a terse expert: one scan, one summary, done. Qwen3-Coder behaved like a careful operator: scan, detect services, verify, cross-check, summarize. It was slower and much chattier, however that trade-off is acceptable when the watcher only allows a few active flows and the marginal token cost is GPU power instead of API billing."
      - paragraph [ref=f3e169]:
        - text: "The current posture is simple: run routine honeypot recon on"
        - code [ref=f3e170]: custom
        - text: backed by vLLM, keep any paid frontier model path human-initiated and terms-compliant, and never let the watcher fan out wider than the scanner containers and GPU can tolerate.
      - heading "Operational Brakes" [level=2] [ref=f3e171]
      - paragraph [ref=f3e172]: Agent-based automation needs visible brakes, especially when it can create containers, run scans, and consume paid or local inference capacity.
      - list [ref=f3e173]:
        - listitem [ref=f3e174]:
          - strong [ref=f3e175]: "Stop new work:"
          - text: stop
          - code [ref=f3e176]: pentagi-watcher.service
          - text: .
        - listitem [ref=f3e177]:
          - strong [ref=f3e178]: "Stop auth:"
          - text: revoke the dedicated PentAGI watcher token.
        - listitem [ref=f3e179]:
          - strong [ref=f3e180]: "Stop current work:"
          - text: finish or cancel active PentAGI flows.
        - listitem [ref=f3e181]:
          - strong [ref=f3e182]: "Control spend:"
          - text: keep
          - code [ref=f3e183]: MAX_ACTIVE_FLOWS
          - text: low and treat increases as capacity changes.
        - listitem [ref=f3e184]:
          - strong [ref=f3e185]: "Control replay:"
          - text: keep the watcher state file durable so restarts do not resubmit the whole blocked list.
      - paragraph [ref=f3e186]: The old failure mode came from asking PentAGI to do exactly what the automation requested, too many times at once. That is why the watcher must own dedupe, active-flow limits, and stale-flow handling before any investigation reaches the agent layer.
      - heading "Why This Pattern Works" [level=2] [ref=f3e187]
      - paragraph [ref=f3e188]: "Most honeypots stop at alerting: \"this IP touched the trap.\" That is useful, however it still leaves triage on you. This pipeline turns the hit into a small report about ownership, exposed services, reputation, and whether the source looks like commodity scanning or something worth blocking more aggressively."
      - 'figure "A better finished flow: PentAGI classifies the hit as scanner infrastructure, records the enrichment path, documents the scan limitations, and leaves me with a short operational summary instead of another raw hit counter." [ref=f3e189]':
        - img "PentAGI flow summary in dark mode with the target IP redacted." [ref=f3e190]
      - paragraph [ref=f3e192]: The practical design rule is to keep the interfaces boring. The honeypot emits JSON, the watcher owns dedupe and flow pressure, PentAGI owns the investigation, and vLLM handles routine inference for events that do not justify paid-token analysis.
      - paragraph [ref=f3e193]: "If you already operate PentAGI, this gives you a useful way to connect low-cost edge signal to agent-driven analysis without letting every scanner become an unbounded workload. If you are still evaluating PentAGI, the important lesson is the same one learned from operating and observing production systems at scale: the integration should create operational context, and the automation must respect capacity."
      - heading "Related Posts" [level=2] [ref=f3e194]
      - paragraph [ref=f3e195]:
        - text: "This setup fits the same pattern I have been using elsewhere in the homelab: small security signals become useful when they are enriched with context, but the automation still needs limits."
        - link "Building an LLM-Powered SIEM for Your Homelab" [ref=f3e196] [cursor=pointer]:
          - /url: /posts/sentinel-llm-siem-homelab
        - text: covers the monitoring side of that idea with Loki, NextDNS, and persistence-based alerting.
      - paragraph [ref=f3e197]:
        - text: The agent safety story matters too.
        - link "Giving Your AI Agent a Real Key to the Vault" [ref=f3e198] [cursor=pointer]:
          - /url: /posts/bws-mcp-server
        - text: explains how I expose secrets to agents through Bitwarden instead of ambient shell access, and
        - link "Stop Letting npm Install Talk to the Internet" [ref=f3e199] [cursor=pointer]:
          - /url: /posts/bitwarden-cli-supply-chain-defense
        - text: is the egress-control companion piece. If you are going to let agents create work, run tools, or touch credentials, those controls stop being optional.
