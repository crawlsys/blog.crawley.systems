        - heading "III.5 Batches, gradient accumulation, epochs" [level=3] [ref=f2e526]
        - list [ref=f2e527]:
          - listitem [ref=f2e528]:
            - strong [ref=f2e529]: Batch size
            - text: ": how many sequences are processed per step. Bigger batches → smoother, less noisy gradients and better hardware utilization, but linearly more activation memory."
          - listitem [ref=f2e530]:
            - strong [ref=f2e531]: Gradient accumulation
            - text: ": fake a big batch by running k small forward/backward passes,"
            - emphasis [ref=f2e532]: summing
            - text: gradients, and stepping once.
            - code [ref=f2e533]: batch 2 × accumulation 8 = effective batch 16
            - text: at the memory cost of batch 2. Free lunch except wall-clock. You'll use this constantly.
          - listitem [ref=f2e534]:
            - strong [ref=f2e535]: Epoch
            - text: ": one full pass over the training dataset. Pretraining does <1 epoch over its trillions of tokens;"
            - strong [ref=f2e536]: finetunes typically want 1–3 epochs
            - text: ", more usually just memorizes."
        - heading "III.6 Overfitting, and the train/eval split" [level=3] [ref=f2e537]
        - paragraph [ref=f2e538]:
          - strong [ref=f2e539]: Overfitting
          - text: "= the model memorizing your training examples instead of learning the general pattern, great scores on data it saw, degraded behavior everywhere else. With small finetuning datasets (hundreds to thousands of examples) it's the #1 practical risk."
        - paragraph [ref=f2e540]:
          - text: "The defense is procedural, not clever: before training, hold out 5–10% of your data as the"
          - strong [ref=f2e541]: eval set
          - text: "(also: validation set) which the model never trains on. Compute loss on it every N steps. The moment eval loss stops falling while train loss keeps dropping, you've learned everything general the data had to teach, stop there ("
          - strong [ref=f2e542]: early stopping
          - text: "), or reduce epochs/lr. Also standard:"
          - strong [ref=f2e543]: checkpointing
          - text: (save weights every N steps) so you can rewind to the best point rather than keeping the overcooked end state.
      - generic [ref=f2e544]:
        - generic [ref=f2e545]: Part IV
        - heading "The taxonomy of training" [level=2] [ref=f2e546]
        - paragraph [ref=f2e547]: "\"Training\" covers several very different activities. Knowing which one someone means dissolves half the confusion in every blog post you'll read."
        - heading "IV.1 Pretraining" [level=3] [ref=f2e548]
        - paragraph [ref=f2e549]:
          - text: From randomly-initialized weights, predict next tokens over trillions of tokens of internet-scale text. Produces a
          - strong [ref=f2e550]: base model
          - text: ", a raw text-completion engine with no manners: ask it a question and it may reply with three more questions, because that's what forum text looks like. Cost: millions of GPU-hours. Not our game, except in miniature (Stage 1), because a 10M-parameter toy version teaches the entire mechanics in 30 minutes."
        - paragraph [ref=f2e551]:
          - emphasis [ref=f2e552]: "Variant:"
          - strong [ref=f2e553]: continued pretraining / domain adaptation
          - text: ", take an existing base model and pretrain"
          - emphasis [ref=f2e554]: further
          - text: on domain text (your wiki, legal corpora, a new language). Sits between pretraining and finetuning; needs more data than SFT (tens of millions of tokens to matter) but is very doable on the estate for small models.
        - heading "IV.2 SFT, Supervised Finetuning" [level=3] [ref=f2e555]
        - paragraph [ref=f2e556]:
          - text: Take a pretrained model, train on
          - code [ref=f2e557]: (prompt → desired response)
          - text: pairs. This is what turns a base model into an
          - strong [ref=f2e558]: instruct/chat model
          - text: ", and it's what 95% of \"I trained my own model\" means in practice. It's also how you teach"
          - emphasis [ref=f2e559]: your
          - text: "stuff: your tone, your formats, your domain's vocabulary, your tool conventions."
        - paragraph [ref=f2e560]: "Two mechanics worth knowing:"
        - list [ref=f2e561]:
          - listitem [ref=f2e562]:
            - strong [ref=f2e563]: Chat templates
            - text: ": chat models are still just next-token predictors, the \"conversation\" is serialized with special tokens, e.g."
            - code [ref=f2e564]: <|im_start|>user\n...<|im_end|>\n<|im_start|>assistant\n...
            - text: . Every model family has its own template, the tokenizer ships it, and
            - strong [ref=f2e565]: using the wrong template silently ruins a finetune
            - text: "(the #1 beginner footgun, the model trains on malformed conversations and gets"
            - emphasis [ref=f2e566]: worse
            - text: ). Frameworks apply it for you if your data is in a standard format.
          - listitem [ref=f2e567]:
            - strong [ref=f2e568]: Loss masking
            - text: ": you usually compute loss only on the"
            - emphasis [ref=f2e569]: assistant's
            - text: tokens, not the user's prompt, you want the model to learn to
            - emphasis [ref=f2e570]: answer
            - text: ", not to imitate questions. A checkbox in every framework ("
            - code [ref=f2e571]: "train_on_inputs: false"
            - text: ).
        - complementary [ref=f2e572]:
          - generic [ref=f2e573]: 🔗
          - generic [ref=f2e574]:
            - generic [ref=f2e575]: Reference
            - link "HF's chat templating docs" [ref=f2e576] [cursor=pointer]:
              - /url: https://huggingface.co/docs/transformers/chat_templating
            - text: ", worth 10 minutes, saves hours."
        - 'heading "IV.3 Preference tuning: RLHF, PPO, DPO, GRPO" [level=3] [ref=f2e577]'
        - paragraph [ref=f2e578]:
          - text: SFT teaches "here is a good answer." Preference methods teach "
          - emphasis [ref=f2e579]: this
          - text: answer is better than
          - emphasis [ref=f2e580]: that
          - text: "one\", tone, judgment, safety, style. The family tree:"
        - list [ref=f2e581]:
          - listitem [ref=f2e582]:
            - strong [ref=f2e583]: RLHF
            - text: (
            - strong [ref=f2e584]: Reinforcement Learning from Human Feedback
            - text: "): the OG ChatGPT recipe. Train a separate"
            - strong [ref=f2e585]: reward model
            - text: on human preference votes, then use RL, specifically
            - strong [ref=f2e586]: PPO
            - text: (
            - strong [ref=f2e587]: Proximal Policy Optimization
            - text: "), to push the LM toward high-reward outputs. Powerful, notoriously fiddly (four models in memory, unstable training). You will likely never run it, and that's fine, because:"
          - listitem [ref=f2e588]:
            - strong [ref=f2e589]: DPO
            - text: (
            - strong [ref=f2e590]: Direct Preference Optimization
            - text: ","
            - link "paper" [ref=f2e591] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2305.18290
            - text: "): the 2023 result showing you can skip the reward model and RL entirely, a simple loss over"
            - code [ref=f2e592]: (prompt, chosen answer, rejected answer)
            - text: triples achieves RLHF-like results. Stable, cheap, runs like SFT.
            - strong [ref=f2e593]: This is our Stage 6.
            - text: "Cousins you'll see:"
            - strong [ref=f2e594]: ORPO
            - text: ","
            - strong [ref=f2e595]: KTO
            - text: ","
            - strong [ref=f2e596]: SimPO
            - text: ", same idea, different loss functions."
          - listitem [ref=f2e597]:
            - strong [ref=f2e598]: GRPO
            - text: (
            - strong [ref=f2e599]: Group Relative Policy Optimization
            - text: "): DeepSeek's RL variant behind R1-style"
            - emphasis [ref=f2e600]: reasoning
            - text: training, sample several answers per prompt, score them (e.g. "did the math answer verify?"), reinforce above-average ones. The current hotness for training chain-of-thought. Feasible at toy scale on the estate.
          - listitem [ref=f2e601]:
            - strong [ref=f2e602]: RLAIF
            - text: (
            - strong [ref=f2e603]: RL from AI Feedback
            - text: "): any of the above but with a strong model, instead of humans, providing the preferences. Note this well,"
            - emphasis [ref=f2e604]: your local Kimi is a free, private preference-labeler.
        - heading "IV.4 Distillation" [level=3] [ref=f2e605]
        - paragraph [ref=f2e606]:
          - text: Use a big
          - strong [ref=f2e607]: teacher
          - text: model to train a small
          - strong [ref=f2e608]: student
          - text: ", either simply by generating synthetic training data from the teacher (this is what everyone means colloquially), or by matching output distributions (classic"
          - link "Hinton distillation" [ref=f2e609] [cursor=pointer]:
            - /url: https://arxiv.org/abs/1503.02531
          - text: "). The estate is unusually well set up for this: Kimi K2.6 (519B) generates unlimited domain-specific training data at zero cost and full privacy, and you finetune a 1–8B student that runs anywhere. Stage 6's finale."
        - heading "IV.5 Merging (the weird one)" [level=3] [ref=f2e610]
        - paragraph [ref=f2e611]:
