          - code [ref=f2e1697]: mine
          - text: ") as the model field. This suits iterating on several adapters over one base: they share weights in memory, and you swap between them for the cost of the tiny A/B matrices."
        - paragraph [ref=f2e1698]:
          - strong [ref=f2e1699]: "The production way: serve the merged model."
          - text: For a single model you'll keep, serve the merged checkpoint, optionally quantized to NVFP4 via TensorRT Model Optimizer (Part VI's serve pipeline, the same
          - code [ref=f2e1700]: spark-vllm-docker
          - text: recipe the estate already runs for Kimi and GLM). One model, lowest per-token overhead, simplest quantization story.
        - heading "Step 3, Register it on litellm" [level=4] [ref=f2e1701]
        - paragraph [ref=f2e1702]:
          - text: The estate's
          - code [ref=f2e1703]: litellm
          - text: gateway (
          - code [ref=f2e1704]: litellm.local-ai.svc:4000
          - text: ", with aliases like"
          - code [ref=f2e1705]: spark-kimi-k2.6
          - text: ","
          - code [ref=f2e1706]: spark-glm-5.2
          - text: ", and"
          - code [ref=f2e1707]: vision
          - text: ) is the one route every consumer uses. Add your model to the homelab litellm config as a new alias,
          - code [ref=f2e1708]: spark-custom
          - text: ", pointing at the vLLM endpoint you just started, and it's reachable through the same API as everything else:"
        - generic [ref=f2e1709]:
          - generic [ref=f2e1710]: run this
          - code [ref=f2e1712]: "curl http://litellm.local-ai.svc:4000/v1/chat/completions \\ -H \"Authorization: Bearer $LITELLM_KEY\" -H \"Content-Type: application/json\" \\ -d '{\"model\": \"spark-custom\", \"messages\": [{\"role\": \"user\", \"content\": \"...\"}]}'"
        - complementary [ref=f2e1713]:
          - generic [ref=f2e1714]: ✅
          - generic [ref=f2e1715]:
            - generic [ref=f2e1716]: Checkpoint
            - strong [ref=f2e1717]: Checkpoint.
            - text: Your finetune answers a
            - code [ref=f2e1718]: curl
            - text: to the
            - code [ref=f2e1719]: spark-custom
            - text: alias on the same gateway as Kimi. You can A/B it blind against the base (point
            - code [ref=f2e1720]: open-webui
            - text: at both aliases) and, if you want the number, run
            - code [ref=f2e1721]: lm-eval-harness
            - text: on MMLU against base and finetune to confirm the finetune didn't wreck general ability (the catastrophic-forgetting check from Part IX).
        - heading "Stage 6, Taste, and the estate's killer app (ongoing)" [level=3] [ref=f2e1722]
        - paragraph [ref=f2e1723]:
          - strong [ref=f2e1724]: Why this stage exists.
          - text: "Stages 2–5 taught the model to do a task. This stage teaches it judgment, which of two answers is better, and then the payoff the whole estate was built for: using your 519B Kimi as a free, private teacher to generate training data for a small student that runs anywhere. This is where \"I have four Sparks on my desk\" turns into \"I trained a model on my niche that fits on a phone, and every token that trained it was made on my LAN.\""
        - paragraph [ref=f2e1725]:
          - strong [ref=f2e1726]: What you'll do.
          - text: "Two open-ended projects. First, preference-tune with DPO. Then the capstone: distill Kimi into a 3B."
        - heading "Project A, DPO (preference tuning)" [level=4] [ref=f2e1727]
        - paragraph [ref=f2e1728]:
          - text: SFT (Stage 2) teaches "here is a good answer." DPO (Direct Preference Optimization, Part IV.3) teaches "this answer is better than that one," which captures tone, safety, and style that a single gold answer can't. It runs much like SFT, but the data is triples (
          - code [ref=f2e1729]: "{\"prompt\", \"chosen\", \"rejected\"}"
          - text: ) and the trainer is
          - code [ref=f2e1730]: DPOTrainer
          - text: ". The cheapest way to get preference pairs without hiring labelers is to have Kimi judge them: generate two answers from your Stage 2 model, ask"
          - code [ref=f2e1731]: spark-kimi-k2.6
          - text: which is better, and that vote becomes one training triple. Your local teacher is a free preference labeler (the RLAIF idea from Part IV.3).
        - heading "Project B, Distillation (the capstone)" [level=4] [ref=f2e1732]
        - paragraph [ref=f2e1733]: "The loop from Part VIII.3, with your own hardware as the data factory:"
        - list [ref=f2e1734]:
          - listitem [ref=f2e1735]:
            - strong [ref=f2e1736]: Seed
            - text: a few hundred instructions in your domain.
          - listitem [ref=f2e1737]:
            - strong [ref=f2e1738]: Generate.
            - text: Point a script at
            - code [ref=f2e1739]: spark-kimi-k2.6
            - text: and have the 519B teacher write a few thousand high-quality instruction-response pairs overnight. It has nothing better to do at 3am, and the marginal cost is zero because it's your LAN, not an API bill.
          - listitem [ref=f2e1740]:
            - strong [ref=f2e1741]: Filter.
            - text: Dedup, length-check, and optionally have Kimi score its own outputs, keeping only the good ones.
          - listitem [ref=f2e1742]:
            - strong [ref=f2e1743]: Train
            - text: a LoRA-SFT (Stage 2's exact recipe) of a 3B student on that synthetic set.
          - listitem [ref=f2e1744]:
            - strong [ref=f2e1745]: Evaluate
            - text: the student against its teacher on your private eval prompts (Part IX), which no benchmark contamination can pollute.
        - complementary [ref=f2e1746]:
          - generic [ref=f2e1747]: ✅
          - generic [ref=f2e1748]:
            - generic [ref=f2e1749]: Checkpoint
            - strong [ref=f2e1750]: Checkpoint / the finish line.
            - text: A 3B model that fits on a handheld does your niche task credibly, trained entirely on data your own 519B model generated, served through your own gateway, evaluated on your own held-out prompts. No frontier API touched the loop. That's the whole estate, end to end, and you built every link of the chain from Part X yourself, one stage at a time.
        - paragraph [ref=f2e1751]: Say "go stage 0" whenever you're ready.
