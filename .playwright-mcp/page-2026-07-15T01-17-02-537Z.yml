        - heading "V.3 QLoRA, LoRA on a quantized base" [level=3] [ref=f2e782]
        - paragraph [ref=f2e783]:
          - link "QLoRA (2023)" [ref=f2e784] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2305.14314
          - text: ": since the base is frozen anyway, why store it in bf16? Quantize it to 4 bits, the paper introduced"
          - strong [ref=f2e785]: NF4
          - text: (
          - strong [ref=f2e786]: NormalFloat-4
          - text: ", a 4-bit code optimized for the bell-curve distribution real weights have) plus"
          - strong [ref=f2e787]: double quantization
          - text: (compress the quantization metadata itself). Gradients flow
          - emphasis [ref=f2e788]: through
