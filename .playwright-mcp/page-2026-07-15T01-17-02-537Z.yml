            - strong [ref=f2e1331]:
              - code [ref=f2e1332]: bitsandbytes NF4 FAIL
            - text: is the
            - code [ref=f2e1333]: sm_121
            - text: snag. It matters, because bitsandbytes is the 4-bit quantization engine QLoRA needs in Stage 3. Fix it now.
        - heading "Step 5, Fix bitsandbytes (the one real failure)" [level=4] [ref=f2e1334]
        - paragraph [ref=f2e1335]:
          - text: Read the actual error. bitsandbytes went looking for
          - code [ref=f2e1336]: libbitsandbytes_cuda131.so
          - text: and didn't find it. It ships precompiled binaries for CUDA 11.8 through 13.0, and the container is CUDA
          - strong [ref=f2e1337]: "13.1"
          - text: ", one version past the newest binary it packages. The library works fine; it just has nothing built for this exact CUDA."
        - paragraph [ref=f2e1338]:
          - text: The fix is one environment variable.
          - code [ref=f2e1339]: BNB_CUDA_VERSION=130
          - text: "tells bitsandbytes to load its CUDA-13.0 binary, which runs under the 13.1 runtime because CUDA is forward-compatible across a minor version like this:"
        - generic [ref=f2e1340]:
          - generic [ref=f2e1341]: run this
          - code [ref=f2e1343]: "docker run --rm --gpus all --ipc=host -e BNB_CUDA_VERSION=130 -v ~/training-lab:/lab \\ nvcr.io/nvidia/pytorch:25.12-py3 bash -c \\ \"pip install -q bitsandbytes && python -c ' import torch, bitsandbytes as bnb from bitsandbytes.nn import Linear4bit l = Linear4bit(512, 512, quant_type=\\\"nf4\\\").cuda() y = l(torch.randn(4, 512, device=\\\"cuda\\\", dtype=torch.bfloat16)) print(f\\\"bnb {bnb.__version__} NF4 PASS with BNB_CUDA_VERSION=130\\\")'\""
        - generic [ref=f2e1344]:
          - generic [ref=f2e1345]: what you should see
          - code [ref=f2e1347]: "WARNING: BNB_CUDA_VERSION=130 environment variable detected; loading libbitsandbytes_cuda130.so. bnb 0.49.2 NF4 PASS with BNB_CUDA_VERSION=130"
        - paragraph [ref=f2e1348]:
          - text: That's the whole fix. Every QLoRA command in Stage 3 carries
          - code [ref=f2e1349]: "-e BNB_CUDA_VERSION=130"
          - text: ", and now you know why. (You could instead compile bitsandbytes from source against CUDA 13.1, or switch to"
          - code [ref=f2e1350]: torchao
          - text: ", PyTorch's native quantizer. Both work; both are more effort than an environment variable you'll delete the day bitsandbytes ships a 13.1 binary.)"
        - complementary [ref=f2e1351]:
          - generic [ref=f2e1352]: 🎯
          - generic [ref=f2e1353]:
            - generic [ref=f2e1354]: Why it matters
            - text: Bleeding-edge hardware always has one or two of these version snags. Finding the bitsandbytes failure now, with a script that tells you exactly what broke, costs five minutes. Finding it three hours into a Stage 3 run costs an afternoon. That's the trade Stage 0 buys you.
        - complementary [ref=f2e1355]:
          - generic [ref=f2e1356]: ✅
          - generic [ref=f2e1357]:
            - generic [ref=f2e1358]: Checkpoint
            - strong [ref=f2e1359]: Checkpoint.
            - text: You have the container pulled, a
            - code [ref=f2e1360]: stage0.py
            - text: that prints a clean PASS/FAIL report,
            - code [ref=f2e1361]: bitsandbytes
            - text: loading under
            - code [ref=f2e1362]: BNB_CUDA_VERSION=130
            - text: ", and you can say in one sentence what each line of the report means. Write the working versions and the bnb workaround into a"
            - code [ref=f2e1363]: STACK.md
            - text: . That file is your source of truth for every stage that follows.
        - heading "Stage 1, Train a GPT from scratch (~15 min)" [level=3] [ref=f2e1364]
        - paragraph [ref=f2e1365]:
          - strong [ref=f2e1366]: Why this stage exists.
          - text: You can't debug a training run you don't understand, and the fastest way to understand one is to watch a tiny model learn from noise in real time. nanoGPT is Karpathy's ~300-line implementation of the four-beat loop from Part III (forward, loss, backward, step) with nothing hidden. In fifteen minutes you'll train a 10-million-parameter character-level GPT on Shakespeare, watch it climb from random gibberish to recognizable Elizabethan English, see an overfitting curve firsthand, then break it on purpose with a bad learning rate. Every warning in Part III becomes a number you generated.
        - paragraph [ref=f2e1367]:
          - strong [ref=f2e1368]: What you'll do.
          - text: Clone nanoGPT, prepare the data, run three training jobs of increasing length (sampling text after each so you watch the model improve), read the loss curve, then crank the learning rate 100× to watch a run fail.
        - heading "Step 1, Clone and prepare the data" [level=4] [ref=f2e1369]
        - generic [ref=f2e1370]:
          - generic [ref=f2e1371]: run this
          - code [ref=f2e1373]: cd ~/training-lab && git clone https://github.com/karpathy/nanoGPT.git docker run --rm --gpus all --ipc=host -v ~/training-lab:/lab nvcr.io/nvidia/pytorch:25.12-py3 \ bash -c "cd /lab/nanoGPT && pip install -q tiktoken && python data/shakespeare_char/prepare.py"
        - generic [ref=f2e1374]:
          - generic [ref=f2e1375]: what you should see
          - code [ref=f2e1377]: train has 1,003,854 tokens val has 111,540 tokens
        - paragraph [ref=f2e1378]:
          - code [ref=f2e1379]: prepare.py
          - text: reads a 1 MB text file of Shakespeare, builds a character-level vocabulary (65 unique characters covering every letter, digit, and punctuation mark that appears), and splits it into a training set (~1M tokens) and a held-back validation set (~112k tokens). That val split is the honesty mechanism from Part III.6. The model never trains on it, so its loss there is an unbiased read on whether the model learned the
          - emphasis [ref=f2e1380]: language
          - text: or just memorized
          - emphasis [ref=f2e1381]: these
          - text: lines.
        - heading "Step 2, A short run, and your first generated text" [level=4] [ref=f2e1382]
        - paragraph [ref=f2e1383]: "Train for 500 iterations, then sample:"
        - generic [ref=f2e1384]:
          - generic [ref=f2e1385]: run this
          - code [ref=f2e1387]: docker run --rm --gpus all --ipc=host -v ~/training-lab:/lab nvcr.io/nvidia/pytorch:25.12-py3 \ bash -c "cd /lab/nanoGPT && \ python train.py config/train_shakespeare_char.py --max_iters=500 --eval_interval=250 \ --eval_iters=100 --compile=False --out_dir=/lab/out-s1-500 && \ python sample.py --out_dir=/lab/out-s1-500 --num_samples=1 --max_new_tokens=200"
        - paragraph [ref=f2e1388]: "The training log, abridged:"
        - generic [ref=f2e1389]:
          - generic [ref=f2e1390]: what you should see
          - code [ref=f2e1392]: "step 0: train loss 4.2881, val loss 4.2821 iter 10: loss 3.1427, time 65.39ms, mfu 5.70% iter 100: loss 2.4574, time 66.15ms, mfu 5.65% iter 250: loss 2.0288 (step 250: val loss 2.0802) iter 500: loss 1.6204 (step 500: val loss 1.7240) number of parameters: 10.65M"
        - paragraph [ref=f2e1393]: "And the text it generates at iteration 500:"
        - generic [ref=f2e1394]:
          - generic [ref=f2e1395]: what you should see
          - code [ref=f2e1397]: "AUTOLYCUS: O swear that feath being abound and may them their and barth hath will be to cedtle oate away, And hence to my must offs, to the hearth! Wherefore earthee sent, will is the overs,"
        - paragraph [ref=f2e1398]:
          - text: Read the numbers first.
          - strong [ref=f2e1399]: Step 0's loss is 4.29.
          - text: That value isn't arbitrary. A model that has learned nothing assigns roughly equal probability to all 65 characters, and the cross-entropy of a uniform guess over 65 options is
          - code [ref=f2e1400]: ln(65) ≈ 4.17
          - text: . Starting at 4.29 confirms the model begins knowing nothing, which is correct. By iteration 500 the loss has more than halved to ~1.62. The
          - strong [ref=f2e1401]:
            - code [ref=f2e1402]: mfu 5.7%
          - text: "is model FLOPs utilization: this model uses about 6% of the GB10's compute, because at 10M parameters it's far too small to saturate the hardware. That's fine here, since you're after the mechanics, not throughput."
        - paragraph [ref=f2e1403]:
          - text: Now read the
          - emphasis [ref=f2e1404]: text
          - text: . It's garbage, but it's
          - strong [ref=f2e1405]: structured
          - text: garbage. The model has already learned that Shakespeare comes in lines, that a capitalized speaker name precedes a colon, that words are short clusters of letters with spaces between them, that apostrophes and commas exist. It learned the
          - emphasis [ref=f2e1406]: shape
          - text: of the language without any of the meaning. Call this the word-shaped-noise milestone.
        - heading "Step 3, The full run, and watching it overfit" [level=4] [ref=f2e1407]
        - paragraph [ref=f2e1408]: "Now train ten times as long, 5000 iterations, evaluating every 500 for a proper loss curve:"
        - generic [ref=f2e1409]:
          - generic [ref=f2e1410]: run this
          - code [ref=f2e1412]: docker run --rm --gpus all --ipc=host -v ~/training-lab:/lab nvcr.io/nvidia/pytorch:25.12-py3 \ bash -c "cd /lab/nanoGPT && \ python train.py config/train_shakespeare_char.py --max_iters=5000 --eval_interval=500 \ --eval_iters=100 --compile=False --out_dir=/lab/out-s1-5000 && \ python sample.py --out_dir=/lab/out-s1-5000 --num_samples=2 --max_new_tokens=300"
        - paragraph [ref=f2e1413]: "Here's the actual train-vs-val loss, every 500 steps:"
        - generic [ref=f2e1414]:
          - generic [ref=f2e1415]: what you should see
          - code [ref=f2e1417]: "step 500: train 1.5279 val 1.7123 step 1000: train 1.2692 val 1.5122 step 1500: train 1.1420 val 1.4809 step 2000: train 1.0530 val 1.4757 <- val loss minimum step 2500: train 0.9597 val 1.4907 step 3000: train 0.8675 val 1.5314 step 3500: train 0.7800 val 1.5626 step 4000: train 0.7063 val 1.6194 step 4500: train 0.6530 val 1.6704 step 5000: train 0.6180 val 1.6866"
        - paragraph [ref=f2e1418]:
          - text: Look at the two columns. The
          - strong [ref=f2e1419]: train
          - text: loss falls the whole way, 1.53 down to 0.62, smooth and monotonic. Watch only that number and you'd conclude the run kept getting better. The
          - strong [ref=f2e1420]: val
          - text: "loss tells a different story: it bottoms out at"
          - strong [ref=f2e1421]: 1.4757 around step 2000
          - text: ", then climbs back up to 1.69."
        - paragraph [ref=f2e1422]:
          - text: That gap is
          - strong [ref=f2e1423]: overfitting
          - text: ", exactly as Part III.6 described, now in your own numbers. Past step 2000 the model stops learning the general structure of Shakespearean English and starts memorizing the specific training text, which lowers train loss while making everything else worse. The best model this run produced was the checkpoint at step ~2000, not the one at step 5000. In a real finetune the move is"
          - strong [ref=f2e1424]: early stopping
          - text: ": keep the step-2000 checkpoint, discard the rest. (nanoGPT does this for you."
          - code [ref=f2e1425]: always_save_checkpoint=False
          - text: means it only saves when val loss improves, so the file on disk is the step-2000 best, not the overcooked end state.)
        - paragraph [ref=f2e1426]: "The generated text at the end is much better than the 500-iter run:"
        - generic [ref=f2e1427]:
          - generic [ref=f2e1428]: what you should see
          - code [ref=f2e1430]: "KING RICHARD III: Then all the world which he is complixed. QUEEN ELIZABETH: And what were they may be the sea And then? What has a crutches are day? DUCHESS OF YORK: I am satisfied to change thee, On England marriage to thy king son,"
        - paragraph [ref=f2e1431]: Real character names (Richard III, Queen Elizabeth, the Duchess of York, all genuinely in the corpus), grammatical scaffolding, dialogue that almost parses. Still meaningless, but the gap between this and "O swear that feath" is 4500 more iterations of the same loop.
        - complementary [ref=f2e1432]:
          - generic [ref=f2e1433]: 🎯
          - generic [ref=f2e1434]:
            - generic [ref=f2e1435]: Why it matters
            - text: More training is not monotonically better. The val curve peaked at step 2000 and got worse for the next 3000 steps, even while the train loss (the number a beginner watches) kept dropping. Trusting the held-out number over the training number is most of what separates people who can finetune from people who overfit without noticing.
        - heading "Step 4, Break it on purpose" [level=4] [ref=f2e1436]
        - paragraph [ref=f2e1437]:
          - text: The cheapest lesson here. Re-run with the learning rate cranked from a sane
          - code [ref=f2e1438]: ~1e-3
          - text: up to
          - code [ref=f2e1439]: "0.1"
          - text: ", 100× too high:"
        - generic [ref=f2e1440]:
          - generic [ref=f2e1441]: run this
          - code [ref=f2e1443]: docker run --rm --gpus all --ipc=host -v ~/training-lab:/lab nvcr.io/nvidia/pytorch:25.12-py3 \ bash -c "cd /lab/nanoGPT && \ python train.py config/train_shakespeare_char.py --max_iters=400 --eval_interval=100 \ --eval_iters=50 --compile=False --learning_rate=0.1 --min_lr=0.01 --out_dir=/lab/out-s1-explode"
        - generic [ref=f2e1444]:
          - generic [ref=f2e1445]: what you should see
          - code [ref=f2e1447]: "step 0: train loss 4.2882 val loss 4.2813 step 100: train loss 3.1096 val loss 3.1361 step 200: train loss 3.4367 val loss 3.4626 <- going the wrong way step 300: train loss 3.3908 val loss 3.4291 step 400: train loss 6.4729 val loss 6.4900 <- diverged"
        - paragraph [ref=f2e1448]:
          - text: Compare it to the healthy run, which was already at 1.53 by step 500. Here the loss dips to 3.11, then climbs back to 3.44, wobbles, and blows up to 6.47, worse than the random starting point of 4.29. The optimizer is taking steps so large it overshoots the minimum every time, ricocheting around the loss landscape instead of settling into it. This is the "too high → loss spikes, oscillates, or explodes" failure from Part III.4, and its signature is a loss that refuses to descend, then climbs. (Push the rate higher still, or drop gradient clipping, and instead of climbing it goes straight to
          - code [ref=f2e1449]: NaN
          - text: ", a dead run.)"
        - complementary [ref=f2e1450]:
          - generic [ref=f2e1451]: ✅
          - generic [ref=f2e1452]:
            - generic [ref=f2e1453]: Checkpoint
            - strong [ref=f2e1454]: Checkpoint.
            - text: You can point at step 0's loss of 4.29 and explain why it's
            - code [ref=f2e1455]: ln(vocab)
            - text: . You watched train loss and val loss diverge and can say which one to trust and where this run should have stopped (step ~2000). You made a run fail with a bad learning rate and can recognize the oscillate-then-climb signature. You can read every column of a nanoGPT log (iter, loss, time, mfu) out loud. That's the vocabulary of every training run in the rest of this guide, learned on a model small enough to see all at once.
        - heading "Stage 2, Your first real finetune (~30 min)" [level=3] [ref=f2e1456]
        - paragraph [ref=f2e1457]:
          - strong [ref=f2e1458]: Why this stage exists.
          - text: "Stage 1 trained a toy from scratch. This is the job you'll actually do most of the time: take a capable instruct model and teach it your task, tone, or format with LoRA. It's the workhorse of the whole guide. You'll finetune Qwen3-1.7B (small enough to iterate fast, real enough to be useful), see how few parameters LoRA trains, watch the loss fall on a held-out set, and compare before and after on fixed prompts so the change is something you can read rather than take on faith."
        - paragraph [ref=f2e1459]:
          - strong [ref=f2e1460]: What you'll do.
          - text: Load the model, generate from it before training, attach a LoRA adapter, train one epoch on ~1000 instruction-response examples with trl's
          - code [ref=f2e1461]: SFTTrainer
          - text: ", then generate from the same prompts again and compare. The whole thing runs well under your 121 GiB; you'll watch it use about a tenth of that."
        - heading "Step 1, Get the model and a dataset" [level=4] [ref=f2e1462]
        - paragraph [ref=f2e1463]:
          - text: Download the base model once to your working directory (it lives on disk and loads instantly after that), and let
          - code [ref=f2e1464]: datasets
          - text: "fetch a small instruction set:"
        - generic [ref=f2e1465]:
          - generic [ref=f2e1466]: run this
          - code [ref=f2e1468]: ~/hfenv/bin/hf download Qwen/Qwen3-1.7B --local-dir ~/training-lab/models/qwen3-1.7b
        - paragraph [ref=f2e1469]:
          - text: The training data is
          - code [ref=f2e1470]: HuggingFaceH4/no_robots
          - text: ", 10k human-written instruction-response pairs in the modern"
          - code [ref=f2e1471]: messages
          - text: format (
          - code [ref=f2e1472]: "[{\"role\": \"user\", ...}, {\"role\": \"assistant\", ...}]"
          - text: ). Take the first 1000 for training and hold out 100 for eval. The
          - code [ref=f2e1473]: messages
          - text: "format matters:"
          - code [ref=f2e1474]: SFTTrainer
          - text: detects it and applies Qwen's chat template automatically, so you never hand-format a prompt string. That also spares you the most common beginner bug, training on the wrong template.
        - heading "Step 2, The finetune script" [level=4] [ref=f2e1475]
        - paragraph [ref=f2e1476]:
          - text: Save as
          - code [ref=f2e1477]: ~/training-lab/scripts/stage2_sft.py
          - text: . The
          - code [ref=f2e1478]: LoraConfig
          - text: and the
          - code [ref=f2e1479]: SFTConfig
          - text: "are the two lines that matter; everything else is plumbing:"
        - generic [ref=f2e1480]:
          - generic [ref=f2e1481]: run this
          - code [ref=f2e1483]: "import torch, json, time from transformers import AutoModelForCausalLM, AutoTokenizer from datasets import load_dataset from peft import LoraConfig from trl import SFTTrainer, SFTConfig MODEL = \"/lab/models/qwen3-1.7b\" tok = AutoTokenizer.from_pretrained(MODEL) PROBES = [\"Explain what a LoRA adapter is in two sentences.\", \"Write a haiku about GPU memory.\", \"What should I check first when my training loss goes to NaN?\"] def generate(model, prompts, tag): for p in prompts: text = tok.apply_chat_template([{\"role\": \"user\", \"content\": p}], add_generation_prompt=True, tokenize=False, enable_thinking=False) ids = tok(text, return_tensors=\"pt\").input_ids.to(model.device) o = model.generate(ids, max_new_tokens=120, do_sample=False) print(f\"[{tag}] {p}\\n -> {tok.decode(o[0][ids.shape[1]:], skip_special_tokens=True)}\\n\") model = AutoModelForCausalLM.from_pretrained(MODEL, dtype=torch.bfloat16, device_map=\"cuda\") print(f\"loaded, cuda mem {torch.cuda.memory_allocated()/2**30:.2f} GiB\") generate(model, PROBES, \"BEFORE\") ds = load_dataset(\"HuggingFaceH4/no_robots\", split=\"train[:1000]\") eval_ds = load_dataset(\"HuggingFaceH4/no_robots\", split=\"train[1000:1100]\") peft_cfg = LoraConfig(r=16, lora_alpha=32, lora_dropout=0.05, target_modules=\"all-linear\", task_type=\"CAUSAL_LM\") cfg = SFTConfig(output_dir=\"/lab/out-s2-lora\", per_device_train_batch_size=2, gradient_accumulation_steps=8, num_train_epochs=1, learning_rate=2e-4, lr_scheduler_type=\"cosine\", warmup_steps=10, logging_steps=5, eval_strategy=\"steps\", eval_steps=20, bf16=True, max_length=1024, report_to=[]) trainer = SFTTrainer(model=model, args=cfg, train_dataset=ds, eval_dataset=eval_ds, peft_config=peft_cfg) tp = sum(p.numel() for p in trainer.model.parameters() if p.requires_grad) ap = sum(p.numel() for p in trainer.model.parameters()) print(f\"trainable {tp/1e6:.1f}M of {ap/1e9:.2f}B = {100*tp/ap:.2f}%\") t0 = time.time(); trainer.train() print(f\"wall-clock {(time.time()-t0)/60:.1f} min, peak mem {torch.cuda.max_memory_allocated()/2**30:.2f} GiB\") trainer.save_model(\"/lab/out-s2-lora/adapter\") generate(trainer.model, PROBES, \"AFTER\")"
        - paragraph [ref=f2e1484]:
          - text: Two config lines carry the idea.
          - code [ref=f2e1485]: LoraConfig(r=16, target_modules="all-linear")
          - text: "applies the Part V.2 theory directly: freeze the 1.7B base, attach rank-16 adapters to every linear layer, train only those."
          - code [ref=f2e1486]: SFTConfig
          - text: "is the training recipe: batch 2 × accumulation 8 for an effective batch of 16, one epoch, a LoRA-appropriate learning rate of"
          - code [ref=f2e1487]: "2e-4"
          - text: ", a cosine schedule with warmup, and an eval every 20 steps on the held-out 100 so you can watch for the overfitting you learned to spot in Stage 1."
        - heading "Step 3, Run it, and mind the container's version skew" [level=4] [ref=f2e1488]
        - generic [ref=f2e1489]:
          - generic [ref=f2e1490]: run this
          - code [ref=f2e1492]: docker run --rm --gpus all --ipc=host -v ~/training-lab:/lab nvcr.io/nvidia/pytorch:25.12-py3 \ bash -c "pip install -q peft trl datasets accelerate && \ pip uninstall -y -q torchao && \ python /lab/scripts/stage2_sft.py"
        - paragraph [ref=f2e1493]:
          - text: The
          - code [ref=f2e1494]: pip uninstall -y torchao
          - text: isn't optional, and it's the second
          - code [ref=f2e1495]: sm_121
          - text: "-container wrinkle after bitsandbytes. The NGC"
          - code [ref=f2e1496]: "25.12"
          - text: image ships
          - code [ref=f2e1497]: torchao 0.15.0
          - text: ", and the"
          - code [ref=f2e1498]: peft
