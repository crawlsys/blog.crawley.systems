        - heading "I.3 Parameters, weights, and what \"8B\" means" [level=3] [ref=f2e81]
        - paragraph [ref=f2e82]:
          - text: A model is a giant pile of numbers called
          - strong [ref=f2e83]: parameters
          - text: or
          - strong [ref=f2e84]: weights
          - text: (the terms are interchangeable). "Llama-3.2-
          - strong [ref=f2e85]: 3B
          - text: "\" = 3 billion parameters. Each is a small number (like 0.0231 or -1.7) that gets multiplied against inputs as data flows through the network. Training = adjusting these numbers. A trained model file is literally just these numbers serialized to disk, which is why an 8B model in"
          - strong [ref=f2e86]: bf16
          - text: (2 bytes per parameter, see Part II.4) is a ~16 GB download.
        - heading "I.4 The transformer, at cocktail-party depth" [level=3] [ref=f2e87]
        - paragraph [ref=f2e88]:
          - text: Every modern LLM is a
          - strong [ref=f2e89]: transformer
          - text: ", an architecture from the 2017 paper"
          - link [ref=f2e90] [cursor=pointer]:
            - /url: https://arxiv.org/abs/1706.03762
            - emphasis [ref=f2e91]: Attention Is All You Need
          - text: ". You don't need the math, but the vocabulary shows up everywhere, so here's the tour:"
        - list [ref=f2e92]:
          - listitem [ref=f2e93]:
            - strong [ref=f2e94]: Embedding
            - text: ": the lookup table that turns each token into a vector (a list of ~2,000–16,000 numbers) the network can process."
          - listitem [ref=f2e95]:
            - strong [ref=f2e96]: Attention
            - text: ": the mechanism that lets each token \"look at\" every previous token and decide which ones matter for predicting what comes next. This is the magic ingredient, it's how the model connects \"her\" back to \"Alice\" from three paragraphs ago."
          - listitem [ref=f2e97]:
            - strong [ref=f2e98]: Attention heads
            - text: ": attention runs many times in parallel with different learned \"perspectives\"; each parallel copy is a head."
            - strong [ref=f2e99]: MHA
            - text: (Multi-Head Attention) is the vanilla version;
            - strong [ref=f2e100]: GQA
            - text: (Grouped-Query Attention) and
            - strong [ref=f2e101]: MLA
            - text: (Multi-head Latent Attention, what Kimi/DeepSeek use, you've seen
            - code [ref=f2e102]: TRITON_MLA
            - text: in the vLLM logs) are memory-saving refinements.
          - listitem [ref=f2e103]:
            - strong [ref=f2e104]: FFN / MLP
            - text: "(Feed-Forward Network / Multi-Layer Perceptron): the other half of each layer, a plain \"multiply by big matrices\" block where most of the parameters live."
          - listitem [ref=f2e105]:
            - strong [ref=f2e106]: Layers / blocks
            - text: ": one attention + one FFN = a block; models stack 24–100+ of them."
          - listitem [ref=f2e107]:
            - strong [ref=f2e108]: KV cache
            - text: "(Key-Value cache): during generation, the model caches per-token attention data so it doesn't recompute the whole history for every new token. This is what eats your serving memory, vLLM's \"KV cache: 763,840 tokens\" log line is this."
          - listitem [ref=f2e109]:
            - strong [ref=f2e110]: MoE
            - text: (
            - strong [ref=f2e111]: Mixture of Experts
            - text: "): instead of one FFN per layer, have many (\"experts\") and route each token to a few of them. You get a huge parameter count with modest compute per token, Kimi K2.6 is 519B parameters"
            - emphasis [ref=f2e112]: total
            - text: but only activates ~30B per token. This is why it's fast
            - emphasis [ref=f2e113]: enough
            - text: on your Sparks. Dense models (Llama, Qwen-dense) activate everything, always.
