        - 'heading "I.2 Tokens: the model''s alphabet" [level=3] [ref=f2e59]'
        - paragraph [ref=f2e60]:
          - text: Models don't read characters or words, they read
          - strong [ref=f2e61]: tokens
          - text: ", chunks produced by a"
          - strong [ref=f2e62]: tokenizer
          - text: . A token is usually 3–5 characters (~¾ of an English word). "unbelievable" might be
          - code [ref=f2e63]: un|believ|able
          - text: . The tokenizer is built once (before pretraining) with an algorithm called
          - strong [ref=f2e64]: BPE
          - text: (
          - strong [ref=f2e65]: Byte-Pair Encoding
          - text: "): start with single bytes, repeatedly merge the most frequent adjacent pair, stop at a target vocabulary size (typically 32k–256k entries)."
        - paragraph [ref=f2e66]: "Why you care:"
        - list [ref=f2e67]:
          - listitem [ref=f2e68]:
            - strong [ref=f2e69]: Context windows
            - text: are measured in tokens (Kimi's 131k context ≈ a 300-page book).
          - listitem [ref=f2e70]:
            - strong [ref=f2e71]: Datasets
            - text: are measured in tokens (pretraining runs consume trillions).
          - listitem [ref=f2e72]:
            - strong [ref=f2e73]: Speed
            - text: is measured in tokens/second (your Kimi does ~15 tok/s decode).
          - listitem [ref=f2e74]: Weird model behaviors (bad at counting letters, arithmetic quirks) are often tokenizer artifacts.
