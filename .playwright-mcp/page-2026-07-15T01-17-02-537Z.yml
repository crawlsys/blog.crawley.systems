          - text: ","
          - strong [ref=f2e615]: TIES
          - text: ","
          - strong [ref=f2e616]: DARE
          - text: ), no training at all, sometimes shockingly effective. Mentioned so the term doesn't surprise you; we may play with it after Stage 5.
