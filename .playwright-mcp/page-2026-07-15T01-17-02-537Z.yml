        - heading "Stage 0, Validate the stack (~20 min)" [level=3] [ref=f2e1281]
        - paragraph [ref=f2e1282]:
          - strong [ref=f2e1283]: Why this stage exists.
          - code [ref=f2e1284]: sm_121
          - text: (GB10's compute capability) is new enough that parts of the ecosystem haven't shipped precompiled kernels for it, and the NGC container tracks CUDA 13.1, newer than most libraries target. Twenty minutes up front tells you which pieces of the stack work, which need a workaround, and which are missing. The output is a
          - code [ref=f2e1285]: STACK.md
          - text: you can trust for every stage after it. Skip it and you'll learn the same facts at hour three of a run that was never going to finish.
        - paragraph [ref=f2e1286]:
          - strong [ref=f2e1287]: What you'll do.
          - text: "Pull the container, then run one script that checks, in order: the GPU is visible to PyTorch, a bf16 matmul runs on it (and how fast), scaled-dot-product attention works, the four core libraries import, and the two historically-fragile pieces load: bitsandbytes (4-bit quantization, needed for QLoRA in Stage 3) and FlashAttention."
        - heading "Step 1, Pull the runtime" [level=4] [ref=f2e1288]
        - generic [ref=f2e1289]:
          - generic [ref=f2e1290]: run this
          - code [ref=f2e1292]: docker pull nvcr.io/nvidia/pytorch:25.12-py3
        - paragraph [ref=f2e1293]:
          - text: It's a large image (tens of GB); pull it once and it's cached. This container carries a matched PyTorch / CUDA / cuDNN / NCCL set built for
          - code [ref=f2e1294]: aarch64
          - text: and Blackwell, which you'd otherwise spend a day assembling by hand and still get subtly wrong.
        - heading "Step 2, Write the probe script" [level=4] [ref=f2e1295]
        - paragraph [ref=f2e1296]:
          - text: Save this as
          - code [ref=f2e1297]: ~/training-lab/scripts/stage0.py
          - text: . Each check prints
          - code [ref=f2e1298]: PASS
          - text: or
          - code [ref=f2e1299]: FAIL
          - text: with the evidence, so you get a scannable report instead of a wall of tracebacks.
        - generic [ref=f2e1300]:
          - generic [ref=f2e1301]: run this
          - code [ref=f2e1303]: "import time, subprocess, torch def sh(c): return subprocess.run(c, shell=True, capture_output=True, text=True).stdout.strip() print(\"== host ==\"); print(sh(\"nvidia-smi --query-gpu=name,driver_version --format=csv,noheader\")) print(f\"torch {torch.__version__} cuda_build {torch.version.cuda} is_available {torch.cuda.is_available()}\") p = torch.cuda.get_device_properties(0) print(f\"device: {p.name} sm_{p.major}{p.minor} {p.total_memory/2**30:.1f} GiB\") # bf16 matmul + rough throughput a = torch.randn(8192, 8192, device=\"cuda\", dtype=torch.bfloat16) b = torch.randn(8192, 8192, device=\"cuda\", dtype=torch.bfloat16) for _ in range(3): a @ b torch.cuda.synchronize(); t0 = time.time(); N = 20 for _ in range(N): c = a @ b torch.cuda.synchronize() dt = (time.time() - t0) / N print(f\"bf16 matmul 8192^3: {dt*1e3:.1f} ms = {2*8192**3/dt/1e12:.1f} TFLOPS PASS\") # attention q = torch.randn(4, 16, 2048, 64, device=\"cuda\", dtype=torch.bfloat16) o = torch.nn.functional.scaled_dot_product_attention(q, q, q) print(f\"SDPA out {tuple(o.shape)} PASS\") # the training libraries for m in [\"transformers\", \"datasets\", \"peft\", \"trl\", \"accelerate\"]: try: print(f\"import {m} {__import__(m).__version__} PASS\") except Exception as e: print(f\"import {m} FAIL: {e}\") # the two fragile ones try: import bitsandbytes as bnb from bitsandbytes.nn import Linear4bit l = Linear4bit(512, 512, quant_type=\"nf4\").cuda() y = l(torch.randn(4, 512, device=\"cuda\", dtype=torch.float16)) print(f\"bitsandbytes {bnb.__version__} NF4 PASS\") except Exception as e: print(f\"bitsandbytes NF4 FAIL: {str(e).splitlines()[0]}\") try: import flash_attn; print(f\"flash_attn {flash_attn.__version__} PASS\") except Exception as e: print(f\"flash_attn ABSENT -> SDPA fallback\")"
