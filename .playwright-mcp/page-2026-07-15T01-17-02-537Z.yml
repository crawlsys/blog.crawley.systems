          - code [ref=f2e1308]: docker run --rm --gpus all --ipc=host -v ~/training-lab:/lab \ nvcr.io/nvidia/pytorch:25.12-py3 bash -c \ "pip install -q peft trl datasets bitsandbytes accelerate && python /lab/scripts/stage0.py"
        - paragraph [ref=f2e1309]: "Here's the actual output from this hardware:"
        - generic [ref=f2e1310]:
          - generic [ref=f2e1311]: what you should see
          - code [ref=f2e1313]: "== host == NVIDIA GB10, 580.159.03 torch 2.10.0a0+b4e4ee81d3.nv25.12 cuda_build 13.1 is_available True device: NVIDIA GB10 sm_121 121.7 GiB bf16 matmul 8192^3: 11.4 ms = 96.4 TFLOPS PASS SDPA out (4, 16, 2048, 64) PASS import transformers 5.13.1 PASS import datasets 5.0.0 PASS import peft 0.19.1 PASS import trl 1.8.0 PASS import accelerate 1.14.0 PASS bitsandbytes NF4 FAIL: Configured CUDA binary not found at .../libbitsandbytes_cuda131.so flash_attn 2.7.4.post1 PASS"
