        - complementary [ref=f2e1660]:
          - generic [ref=f2e1661]: 🎯
          - generic [ref=f2e1662]:
            - generic [ref=f2e1663]: Why it matters
            - text: Distributed training is a trade, not free speed. Every step, the nodes stop and exchange gradients, and whether that pays off depends on how the compute-per-step compares to the communication-per-step. For a tiny 98M model with big gradients relative to its compute, the tax is steep (1.4×). For a real finetune where each node does far more compute per step, the same fixed communication is a smaller fraction and scaling approaches linear. You can now measure that ratio instead of guessing it.
        - paragraph [ref=f2e1664]:
          - strong [ref=f2e1665]: DDP vs FSDP, in one breath (Part VII.2).
          - text: DDP put a whole copy of the model on each node, fine here because 98M fits anywhere. When the model doesn't fit on one node, you switch to FSDP, which shards the parameters, gradients, and optimizer states across nodes so each holds only 1/N. That trades more fabric traffic (weights move every step, not just gradients) for the ability to train a model too big for any single Spark. The launch is nearly identical (
          - code [ref=f2e1666]: accelerate launch
          - text: with an FSDP config instead of bare
          - code [ref=f2e1667]: torchrun
          - text: ); only the mental model changes. DDP replicates and syncs gradients; FSDP shards and gathers weights just in time. On a 25 GB/s fabric FSDP runs leisurely, but it's the difference between "can't train this at all" and "trains overnight."
