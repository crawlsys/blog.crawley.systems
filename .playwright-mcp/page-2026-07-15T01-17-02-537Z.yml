        - generic [ref=f2e400]: Part III
        - heading "The training loop, for real this time" [level=2] [ref=f2e401]
        - paragraph [ref=f2e402]: "This is the part to actually internalize. Every training framework, from nanoGPT's 300 lines to a trillion-parameter lab run, is this loop:"
        - code [ref=f2e405]: "for each batch of examples: 1. FORWARD: run the batch through the model → predictions 2. LOSS: measure how wrong the predictions are → one number 3. BACKWARD: compute, for every parameter, \"which direction would reduce the loss?\" → gradients (backpropagation) 4. STEP: nudge every parameter a tiny bit in that direction (the optimizer does this), then zero the gradients"
        - figure "The training loop The four beats every framework plays, forever" [ref=f2e406]:
          - generic [ref=f2e407]:
            - generic [ref=f2e408]: The training loop
            - generic [ref=f2e409]: The four beats every framework plays, forever
          - generic [ref=f2e410]:
            - generic [ref=f2e411]:
