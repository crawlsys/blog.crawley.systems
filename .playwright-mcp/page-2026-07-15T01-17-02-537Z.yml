        - heading "I.1 Next-token prediction is the whole game" [level=3] [ref=f2e44]
        - paragraph [ref=f2e45]:
          - text: A
          - strong [ref=f2e46]: language model (LM)
          - text: is a function that takes a sequence of text and outputs a probability for every possible
          - emphasis [ref=f2e47]: next
          - text: "piece of text. That's it. \"The cat sat on the ___\" → {mat: 9%, floor: 7%, couch: 5%, ...}. Generation is just running this in a loop: predict, pick, append, repeat."
        - paragraph [ref=f2e48]:
          - text: Everything impressive an
          - strong [ref=f2e49]: LLM
          - text: (
          - strong [ref=f2e50]: Large Language Model
          - text: ", same thing, but big) does, code, reasoning, tool calls, is an emergent consequence of getting extremely good at this one prediction task over an enormous amount of text. Training is the process of getting good at it."
        - complementary [ref=f2e51]:
          - generic [ref=f2e52]: 📚
          - generic [ref=f2e53]:
