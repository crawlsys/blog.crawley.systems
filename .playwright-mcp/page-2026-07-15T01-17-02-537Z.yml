          - listitem [ref=f2e792]: "Cost: ~30% slower than bf16 LoRA, negligible quality loss."
        - paragraph [ref=f2e793]:
          - text: Classic implementation is the
          - strong [ref=f2e794]: bitsandbytes
          - text: "library; sm_121/aarch64 support is exactly the kind of thing we verify in Stage 0 (fallback:"
          - strong [ref=f2e795]: torchao
          - text: ", PyTorch's native quantization library, which is the future anyway)."
        - heading "V.4 Gradient checkpointing, the other memory lever" [level=3] [ref=f2e796]
        - paragraph [ref=f2e797]:
          - strong [ref=f2e798]: Gradient checkpointing
          - text: (=
          - emphasis [ref=f2e799]: activation checkpointing
          - text: "): during forward, don't keep all activations for backprop, keep sparse \"checkpoints\" and"
          - emphasis [ref=f2e800]: recompute
          - text: the rest on the fly during backward. Trades ~25–35% extra compute for cutting activation memory several-fold. It's a single boolean in every framework, and at our bandwidth-rich-in-capacity, poor-in-speed situation, it's almost always worth flipping on for bigger models.
