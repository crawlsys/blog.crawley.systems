        - heading "V.2 LoRA, Low-Rank Adaptation" [level=3] [ref=f2e719]
        - paragraph [ref=f2e720]:
          - link "LoRA (2021)" [ref=f2e721] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2106.09685
          - text: "'s idea:"
          - strong [ref=f2e722]: freeze
          - text: the pretrained weights entirely. For each big weight matrix W (say 4096×4096 = 16.7M params), learn a
          - emphasis [ref=f2e723]: correction
          - text: ΔW, but force ΔW to be
          - strong [ref=f2e724]: low-rank
          - text: ": the product of two skinny matrices, A (4096×r) and B (r×4096), with"
          - strong [ref=f2e725]: r
          - text: (the
          - strong [ref=f2e726]: rank
          - text: ) tiny, like 16. The corrected layer computes
          - code [ref=f2e727]: Wx + BAx
          - text: .
        - list [ref=f2e728]:
          - listitem [ref=f2e729]:
            - text: "Trainable params for that layer: 4096×16×2 = 131k,"
            - strong [ref=f2e730]: 0.8%
            - text: of the original.
          - listitem [ref=f2e731]:
            - text: The frozen base needs only its 2 bytes/param (no gradients, no optimizer state, those costs apply
            - emphasis [ref=f2e732]: only to trainable params
            - text: ).
          - listitem [ref=f2e733]:
            - text: "8B model + LoRA: 16 GB frozen base + a few hundred MB of adapter states + activations ≈"
            - strong [ref=f2e734]: ~20 GB
            - text: . From 128+ GB to 20.
        - paragraph [ref=f2e735]: "The justification: finetuning changes are empirically low-rank, you're steering a capable model, not rebuilding it, and steering doesn't need billions of degrees of freedom."
        - paragraph [ref=f2e736]:
          - strong [ref=f2e737]: "The knobs (defaults in parentheses, genuinely fine to start):"
        - list [ref=f2e738]:
          - listitem [ref=f2e739]:
            - strong [ref=f2e740]: r
            - text: "(16): adapter capacity. 8–64 typical. More = stronger changes possible, more memory, more overfitting risk."
          - listitem [ref=f2e741]:
            - strong [ref=f2e742]: lora_alpha
            - text: "(32): scaling factor; effective strength ≈ alpha/r. Convention: alpha = 2r. Don't overthink it."
          - listitem [ref=f2e743]:
            - strong [ref=f2e744]: target_modules
            - text: "(\"all-linear\"): which matrices get adapters. Attention-only is the old default; targeting all linear layers works better ("
            - link "QLoRA paper finding" [ref=f2e745] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2305.14314
            - text: ).
          - listitem [ref=f2e746]:
            - strong [ref=f2e747]: lora_dropout
            - text: "(0.05): mild overfitting protection."
        - paragraph [ref=f2e748]:
          - text: The output of training is an
          - strong [ref=f2e749]: adapter
          - text: ": a file of just the A/B matrices, typically 50–500 MB. You can"
          - strong [ref=f2e750]: merge
          - text: it into the base (produces a normal standalone model, what we'll serve in Stage 5) or keep it separate and hot-swap adapters over one base.
