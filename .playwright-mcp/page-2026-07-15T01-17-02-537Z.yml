            - generic [ref=f2e414]: →
            - generic [ref=f2e415]:
              - generic [ref=f2e416]: 2 · LOSS
              - generic [ref=f2e417]: measure how wrong → one number (cross-entropy)
            - generic [ref=f2e418]: →
            - generic [ref=f2e419]:
              - generic [ref=f2e420]: 3 · BACKWARD
              - generic [ref=f2e421]: gradients for every parameter (backprop)
            - generic [ref=f2e422]: →
            - generic [ref=f2e423]:
