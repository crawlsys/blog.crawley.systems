            - text: is a sanity check, not a benchmark. It confirms the GPU does real bf16 math at a plausible rate. LLM work is usually bandwidth-bound (Part II), so you'll rarely see peak FLOPS; this is a floor that proves the compute path works.
          - listitem [ref=f2e1323]:
