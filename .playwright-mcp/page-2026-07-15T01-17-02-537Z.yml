          - generic [ref=f2e426]:
            - text: ↺ repeat for every batch, this loop
            - emphasis [ref=f2e427]: is
            - text: training, from nanoGPT's 300 lines to a trillion-parameter lab run
        - heading "III.1 Loss and cross-entropy" [level=3] [ref=f2e428]
        - paragraph [ref=f2e429]:
          - text: The
          - strong [ref=f2e430]: loss function
          - text: turns "how wrong were we" into a single number. For LMs it's
          - strong [ref=f2e431]: cross-entropy
          - text: ": for each position, look at the probability the model assigned to the"
          - emphasis [ref=f2e432]: actual
          - text: next token, take -log of it. Assigned 100%? loss 0. Assigned 1%? loss 4.6. Average over all positions.
        - paragraph [ref=f2e433]:
          - text: "Rules of thumb: random guessing over a 50k vocab ≈ loss 10.8. Decent pretrained models sit ~1.5–2.5 on English text."
          - strong [ref=f2e434]: Perplexity
          - text: = e^loss ("effectively, how many tokens was the model torn between"), same information, different scale.
        - heading "III.2 Backpropagation and gradients" [level=3] [ref=f2e435]
        - paragraph [ref=f2e436]:
          - strong [ref=f2e437]: Backpropagation
          - text: ("backprop") is the algorithm that computes, for all N billion parameters simultaneously, ∂loss/∂parameter, "if I increased this weight slightly, would loss go up or down, and how steeply?" That vector of sensitivities is the
          - strong [ref=f2e438]: gradient
          - text: . PyTorch does this automatically (
          - strong [ref=f2e439]: autograd
          - text: ), you write the forward pass;
          - code [ref=f2e440]: loss.backward()
          - text: produces every gradient. It works by applying the chain rule backward through the recorded computation graph, which requires keeping the forward pass's intermediate results (
          - strong [ref=f2e441]: activations
          - text: ) in memory, remember this for the memory math in Part V.
        - complementary [ref=f2e442]:
          - generic [ref=f2e443]: 📚
          - generic [ref=f2e444]:
            - generic [ref=f2e445]: Deeper dive
            - text: Karpathy's
            - link "micrograd video" [ref=f2e446] [cursor=pointer]:
              - /url: https://www.youtube.com/watch?v=VMj-3S1tku0
            - text: builds backprop from scratch in ~90 minutes and is genuinely the best single explainer in the field.
        - 'heading "III.3 Optimizers: SGD, Adam, AdamW" [level=3] [ref=f2e447]'
        - paragraph [ref=f2e448]:
          - text: The
          - strong [ref=f2e449]: optimizer
          - text: decides how to turn gradients into parameter updates.
        - list [ref=f2e450]:
          - listitem [ref=f2e451]:
            - strong [ref=f2e452]: SGD
            - text: (
            - strong [ref=f2e453]: Stochastic Gradient Descent
            - text: "):"
            - code [ref=f2e454]: param -= lr × gradient
            - text: . The "stochastic" = we estimate the gradient from a small random batch rather than the whole dataset.
          - listitem [ref=f2e455]:
            - strong [ref=f2e456]: Adam
            - text: (
            - strong [ref=f2e457]: Adaptive Moment Estimation
            - text: "): keeps two running averages per parameter, recent gradient direction ("
            - emphasis [ref=f2e458]: momentum
            - text: ") and recent gradient magnitude, and scales each parameter's step size individually. Converges much faster on transformers. Cost: those two running averages are stored in FP32, i.e."
            - strong [ref=f2e459]: 8 extra bytes per parameter
            - text: . This single fact drives most of the memory arithmetic in Part V.
          - listitem [ref=f2e460]:
            - strong [ref=f2e461]: AdamW
            - text: ": Adam with decoupled"
            - strong [ref=f2e462]: weight decay
            - text: (a mild pull toward zero that improves generalization).
            - strong [ref=f2e463]: The default for everything we'll do.
            - text: Memory-lighter variants exist (
            - strong [ref=f2e464]: 8-bit Adam
            - text: ","
            - strong [ref=f2e465]: Adafactor
            - text: ) when we're squeezed.
        - 'heading "III.4 Learning rate: the knob that matters" [level=3] [ref=f2e466]'
        - paragraph [ref=f2e467]:
          - text: The
          - strong [ref=f2e468]: learning rate (lr)
          - text: "scales every update. It is the hyperparameter most likely to make or break a run:"
        - list [ref=f2e469]:
          - listitem [ref=f2e470]: Too high → loss spikes, oscillates, or explodes to NaN (Not a Number, numeric overflow; the run is dead).
          - listitem [ref=f2e471]: Too low → loss creeps down glacially; you waste a day learning nothing.
          - listitem [ref=f2e472]: "Typical values: full finetune ~1e-5 to 5e-5; LoRA ~1e-4 to 3e-4 (LoRA tolerates higher); pretraining ~3e-4 to 6e-4."
        - paragraph [ref=f2e473]:
          - text: Nobody uses a constant lr. A
          - strong [ref=f2e474]: schedule
          - text: ramps it up from zero over the first few hundred steps (
          - strong [ref=f2e475]: warmup
          - text: ", protects the fragile early phase), then decays it ("
          - strong [ref=f2e476]: cosine decay
          - text: is the common shape) so late training settles gently. Frameworks handle this; you pick the peak value and the schedule name.
        - paragraph [ref=f2e477]:
          - strong [ref=f2e478]: Grokking loss curves
          - text: "(you'll stare at these a lot):"
        - list [ref=f2e479]:
          - listitem [ref=f2e480]: Smooth downward slope, gradually flattening → healthy.
          - listitem [ref=f2e481]: "Flat from the start → lr too low, or something's not actually training (classic bug: forgot to unfreeze/target the right modules)."
          - listitem [ref=f2e482]: Spikes that recover → borderline lr, usually survivable.
          - listitem [ref=f2e483]:
            - text: Spike to NaN → dead run; lower lr, add
            - strong [ref=f2e484]: gradient clipping
            - text: (cap the gradient norm at e.g. 1.0, standard, always on).
          - listitem [ref=f2e485]:
            - strong [ref=f2e486]: Training loss falls while eval loss rises → overfitting
            - text: (Section III.6). The most important pattern to recognize.
