      - heading "Skills, or How You Stop Reminding Claude" [level=2] [ref=f2e142]
      - paragraph [ref=f2e143]: Tools are only half the problem. The other half is convincing Claude to use them when the work calls for it, instead of reaching for its built-in vision capability or burning context on a long YouTube transcript that some other tool already produced for free.
      - paragraph [ref=f2e144]:
        - text: Claude Code's
        - link "skills" [ref=f2e145] [cursor=pointer]:
          - /url: https://docs.claude.com/en/docs/claude-code/skills
        - text: system solves this. A skill is a small markdown file with YAML frontmatter that tells Claude what the skill does and when to invoke it. The frontmatter is matched against the user's intent, so a well-written description means Claude reaches for the skill on the right kinds of prompts without you having to remember to say "use thor-vid".
      - paragraph [ref=f2e146]:
        - text: The skill that wraps
        - code [ref=f2e147]: thor-vid
        - text: "is twenty lines:"
      - code [ref=f2e149]:
        - generic [ref=f2e150]: ~/.claude/skills/thor-vid/SKILL.md
        - text: "--- name: thor-vid description: > Transcribe and frame-caption a video using the homelab Whisper + VL stack on bruiser. Use whenever the user shares a YouTube URL or a local video file and wants a summary, transcript, scene description, or \"what does this video say\". Always prefer this over watching the video or transcribing with a frontier model. Triggers: youtube link, video file, .mp4, .mov, \"summarize this video\", \"what's in this video\", \"transcribe\". --- # thor-vid skill When the user gives you a video URL or a local video file: 1. Run `thor-vid <url-or-path>` and wait for completion. 2. Read `~/.agents/scratch/thor-vid/<slug>/summary.md`. 3. Answer the user's actual question from that file. Do not paste the whole transcript unless they explicitly ask for it. Use `--frames-per-min` to control caption density. Default is 4. For dense tutorial content, bump to 6 or 8."
      - paragraph [ref=f2e151]:
        - text: Two things in there matter beyond the obvious "run this CLI" instruction. The
        - strong [ref=f2e152]: description
        - text: is written for Claude's matcher, not for a human reader, which is why it lists trigger phrases and explicitly tells Claude to prefer the local path over the frontier path. And the
        - strong [ref=f2e153]: numbered steps
        - text: "close the loop: Claude runs the CLI, reads the report, and answers the question rather than dumping the transcript back to the user."
      - paragraph [ref=f2e154]:
        - text: The
        - code [ref=f2e155]: thor-ask
        - text: "skill is shaped the same way:"
      - code [ref=f2e157]:
        - generic [ref=f2e158]: ~/.claude/skills/thor-ask/SKILL.md (excerpt)
        - text: "--- name: thor-ask description: > Describe images, screenshots, and PDF pages using the local vision model. Use whenever the user shares an image file, asks \"what's on this screen\", or needs OCR. Prefer this over reading the image directly. Triggers: png, jpg, screenshot, \"read this image\", \"what does this say\", \"OCR\". ---"
      - paragraph [ref=f2e159]:
        - text: One real behavior change came out of this. Before the skill existed, I would say "look at this screenshot" and Claude would happily process the image with its own vision capability, which is fine but burns input tokens against a paid quota. Now Claude defers to
        - code [ref=f2e160]: thor-ask
        - text: for routine reads and only falls back to its native vision when the prompt actually rewards a smarter model — diagrams that need careful structural reasoning, code in screenshots that needs to be modified, that kind of thing.
      - heading "Wiring the AYN Thor" [level=2] [ref=f2e161]
      - paragraph [ref=f2e162]: "The Thor was the test that proved the rest of the setup was worth keeping. The device is unusual: dual screens, rooted Android 13, ADB-only access (SSH is closed), an unfamiliar mix of GameNative, ES-DE, and a stock launcher that fights the second screen. The community wisdom is scattered across YouTube videos, forum posts, and the occasional README."
      - paragraph [ref=f2e163]: "I told Claude what I had, pointed it at three setup videos, and let the skills do the rest:"
      - code [ref=f2e165]:
        - generic [ref=f2e166]: the actual conversation
        - text: "me: here are three videos about setting up the AYN Thor. Use thor-vid on each, then write me a short setup plan. I want to land Steam (GameNative) on the primary display and ES-DE as the home app. claude: [runs thor-vid on each URL] [reads three summary.md files] Plan: 1. Set ES-DE as home: cmd package set-home-activity ... 2. GameNative is the practical \"Steam\" client on rooted ARM Android. Force it onto the primary display with: cmd activity start-activity --display 0 -n app.gamenative/.MainActivityAliasDefault 3. CocoonShell still runs on display 4 — leave it alone, it doesn't fight ES-DE. 4. ROMs go under /storage/<volume>/Emulation/roms. Want me to write the steam-on-top wrapper to /data/local/tmp/ now?"
      - paragraph [ref=f2e167]: "Total work on my side: three URLs, one paragraph of intent. Total time on the homelab side: about six minutes for transcription and captioning, parallelizable across the three videos. Total frontier tokens spent on the routine narration: zero."
      - paragraph [ref=f2e168]: The Thor topology I ended up with — Display 0 as the primary "Built-in Screen", Display 4 as the secondary touch panel, GameNative on display 0, ES-DE as home — came directly out of those summaries combined with a couple of follow-up questions Claude could answer from the merged transcripts.
      - heading "What This Pattern Buys You" [level=2] [ref=f2e169]
      - paragraph [ref=f2e170]: "The architecture is small enough that the value gets lost if you describe it as \"local inference\". The real shift is the routing rule: send the bulk, narration-shaped work to your own GPU, and reserve the frontier model for the work that benefits from a frontier model."
      - paragraph [ref=f2e171]: "You get a few practical things from that:"
      - list [ref=f2e172]:
        - listitem [ref=f2e173]:
          - strong [ref=f2e174]: Cost stops scaling with input size.
          - text: A two-hour podcast and a twelve-minute video cost the same wattage to transcribe. They cost dramatically different amounts on a per-token API.
        - listitem [ref=f2e175]:
          - strong [ref=f2e176]: Privacy is the default.
          - text: The screen captures, the local PDFs, the homelab screenshots — none of it leaves the network.
        - listitem [ref=f2e177]:
          - strong [ref=f2e178]: You stop apologizing for your inputs.
          - text: Big logs, long videos, dense screenshots, hour-long meeting recordings — all fine, because the model serving them costs nothing per token.
        - listitem [ref=f2e179]:
          - strong [ref=f2e180]: Frontier reasoning gets sharper.
          - text: Claude is no longer chewing through twenty thousand tokens of YouTube auto-captions before it gets to the question you actually asked. The local stack distills first; Claude reasons over the distillation.
      - heading "What's Worth Doing Yourself" [level=2] [ref=f2e181]
      - paragraph [ref=f2e182]: "If you want to try this without recreating my whole homelab, the order I would build in is:"
      - list [ref=f2e183]:
        - listitem [ref=f2e184]:
          - strong [ref=f2e185]: Stand up one OpenAI-compatible vision endpoint.
          - text: A single GPU, vLLM, a Qwen2.5-VL or Phi-3.5-vision model. Confirm you can hit
          - code [ref=f2e186]: /v1/chat/completions
          - text: with a base64 image.
        - listitem [ref=f2e187]:
          - strong [ref=f2e188]: Wrap it in a tiny CLI.
          - text: Take a file or a URL, return a paragraph. Resist the temptation to make this a service. CLIs compose with skills, prompts, and shell loops in a way services don't.
        - listitem [ref=f2e189]:
          - strong [ref=f2e190]: Add Whisper if you watch video.
          - text: faster-whisper-server is a single container, runs on the same GPU, and the OpenAI-compatible mode means your CLI is one HTTP call.
        - listitem [ref=f2e191]:
          - strong [ref=f2e192]: Write the skill last.
          - text: The CLI has to be reliable before the skill is worth installing — a flaky tool that Claude reaches for automatically is worse than no tool at all.
      - paragraph [ref=f2e193]:
        - text: The full source for
        - code [ref=f2e194]: thor-ask
        - text: and
        - code [ref=f2e195]: thor-vid
        - text: lives in
        - link "kvncrw/thor-tools" [ref=f2e196] [cursor=pointer]:
          - /url: https://github.com/kvncrw/thor-tools
        - text: ", and the skills directory layout follows the standard"
        - link "Claude Code skill format" [ref=f2e197] [cursor=pointer]:
          - /url: https://docs.claude.com/en/docs/claude-code/skills
        - text: . Nothing here requires a special integration — it's all OpenAI-compatible HTTP and a few markdown files.
      - heading "Related Posts" [level=2] [ref=f2e198]
      - paragraph [ref=f2e199]:
        - text: The same routing argument shows up in
        - link "Turning Honeypot Noise into PentAGI Investigations" [ref=f2e200] [cursor=pointer]:
          - /url: /posts/honeypot-pentagi-bridge
        - text: ", where the same RTX 5090 handles routine defensive recon while paid models stay reserved for human-initiated work. The shared idea: agents need to spend tokens like an operator spends money, and the only way that happens is by giving them a cheaper path that's good enough for the routine case."
