    - heading "Stop Burning Frontier Tokens on Routine Inference" [level=1] [ref=f2e19]
    - paragraph [ref=f2e20]: Two small CLIs and a pair of Claude skills push image, video, and research work onto a homelab GPU. Frontier intelligence stays for the part of the job that actually needs it.
  - article [ref=f2e22]:
    - generic [ref=f2e23]:
      - paragraph [ref=f2e24]: Why are we still paying frontier-token prices to read a screenshot?
      - paragraph [ref=f2e25]:
        - text: Last week I unboxed an
        - link "AYN Thor" [ref=f2e26] [cursor=pointer]:
          - /url: https://www.aynstore.com/products/thor
        - text: handheld and went looking for the canonical "set this up like a pro" YouTube video. There isn't one, because the Thor is new, dual-screen, rooted Android, and the existing handheld content is mostly ROG Ally and Steam Deck material. I was not going to sit through ten loosely related videos to learn which launcher to install and how to get Steam onto the top screen.
      - paragraph [ref=f2e27]: So I asked Claude. Claude is a fine reasoning agent and a perfectly competent research analyst, but you don't need a frontier model to summarize a 12-minute YouTube clip about a launcher menu. You need a transcript, a few captioned frames, and a model that can write a paragraph. I already have a homelab with an RTX 5090, so I built two small tools and two Claude skills that send the routine work there and reserve Claude's frontier reasoning for the part of the job that actually benefits from it.
      - paragraph [ref=f2e28]:
        - text: "The result is the setup in this post: two CLIs ("
        - code [ref=f2e29]: thor-ask
        - text: for screen and image narration,
        - code [ref=f2e30]: thor-vid
        - text: for video transcription and scene description), a local vision model on the 5090, and Claude skills that nudge the assistant toward the local path whenever the work is token-heavy and the answer doesn't need GPT-class judgment.
      - heading "The Routing Decision" [level=2] [ref=f2e31]
      - paragraph [ref=f2e32]: "Before any tooling, you need a clean way to decide which model gets which job. I think about it as three buckets:"
      - list [ref=f2e33]:
        - listitem [ref=f2e34]:
          - strong [ref=f2e35]: Frontier reasoning.
          - text: Hard architecture decisions, multi-file refactors, novel security analysis, anything where one wrong call costs hours. Pay frontier-token prices here.
        - listitem [ref=f2e36]:
          - strong [ref=f2e37]: Bulk narration.
          - text: Image OCR, screenshot summaries, video transcription, scene captioning, "what's on this PDF page". The output is mechanical description, the input is huge, and the marginal value of a smarter model is small.
        - listitem [ref=f2e38]:
          - strong [ref=f2e39]: Bulk research.
          - text: Reading ten blog posts to extract one comparison table, summarizing a channel's worth of YouTube videos, distilling release notes across a dozen versions. Token-heavy, judgment-light.
      - figure "The routing rule. Anything frontier-shaped goes to the paid API. Anything narration- or research-shaped goes to the homelab GPU." [ref=f2e40]:
        - img "Routing diagram showing frontier reasoning routed to a paid frontier API while bulk narration and bulk research route to a local GPU." [ref=f2e41]:
          - generic [ref=f2e42]:
            - generic [ref=f2e44]: frontier reasoning
            - generic [ref=f2e45]: architecture, refactors, novel analysis
            - generic [ref=f2e47]: bulk narration
            - generic [ref=f2e48]: OCR, screenshots, video, frame captioning
            - generic [ref=f2e50]: bulk research
            - generic [ref=f2e51]: cross-doc summary, release-note distill
          - generic [ref=f2e59]:
            - generic [ref=f2e61]: FRONTIER API
            - generic [ref=f2e62]: paid model, billed per token
            - generic [ref=f2e63]: Claude / GPT / etc — reserved for hard work
            - generic [ref=f2e65]: LOCAL GPU
            - generic [ref=f2e66]: RTX 5090 in the homelab
            - generic [ref=f2e67]: vLLM + faster-whisper, OpenAI-compatible
            - generic [ref=f2e68]: cost = wattage, not tokens
      - paragraph [ref=f2e70]: Buckets two and three are where local hardware wins. A single 5090 with 32 GB of VRAM can run a 30B-class model with plenty of context, and the only ongoing cost is the wattage. Once a model lives behind an OpenAI-compatible URL, anything that speaks the chat-completions protocol can call it. That includes Claude, when you give it a tool that points at the right endpoint.
      - heading "The Hardware Behind the Endpoints" [level=2] [ref=f2e71]
      - paragraph [ref=f2e72]:
        - text: The homelab side is intentionally small. One node (
        - code [ref=f2e73]: bruiser
        - text: ") holds an RTX 5090 and serves two endpoints inside the cluster:"
      - code [ref=f2e75]:
        - generic [ref=f2e76]: homelab inference endpoints
        - text: "# image / video frame description (Qwen2.5-VL-7B-Instruct-AWQ) http://172.16.100.117:31800/v1 # audio transcription (faster-whisper, OpenAI-compatible) http://172.16.100.117:31900/v1"
      - paragraph [ref=f2e77]:
        - text: The vision model is small enough to share the GPU with my agent-routing model through time-slicing, so the same 5090 also handles tool-calling work for
        - link "PentAGI" [ref=f2e78] [cursor=pointer]:
          - /url: /posts/honeypot-pentagi-bridge
        - text: "and a few other agents. There is nothing exotic in the stack: vLLM, faster-whisper-server, ArgoCD, a NodePort. The interesting part is what you do with these endpoints once they exist."
      - 'heading "thor-ask: Read the Screen, Read the Image" [level=2] [ref=f2e79]'
      - paragraph [ref=f2e80]:
        - text: The first tool is
        - code [ref=f2e81]: thor-ask
        - text: . It started as a Thor-specific helper for reading the handheld's screen over ADB, then I generalized the underlying call so it works on any image.
      - paragraph [ref=f2e82]: "The Thor variant is a one-liner. It pulls a screenshot off the device and sends it to the local vision model with a prompt biased toward OCR and game identification:"
      - code [ref=f2e84]:
        - generic [ref=f2e85]: thor-ask, screen capture path
        - text: "$ thor-ask \"what app is on screen and what's the menu state?\" [capture 412KB in 88ms; model=Qwen/Qwen2.5-VL-7B-Instruct-AWQ] [llm 1.4s] ES-DE frontend on the primary display, \"Systems\" view focused on the \"Nintendo - GameCube\" tile. Top-right shows time 14:32 and battery 78%. The bottom hint bar reads \"A: Select B: Back Start: Menu\"."
      - paragraph [ref=f2e86]:
        - text: Behind that is a tiny Python script. The capture step is
        - code [ref=f2e87]: adb exec-out screencap -p
        - text: ", the inference step is a base64-encoded image inside an OpenAI"
        - code [ref=f2e88]: chat/completions
        - text: "request. Total source is about 100 lines, no dependencies outside the standard library:"
      - code [ref=f2e90]:
        - generic [ref=f2e91]: "thor-ask: the call to vLLM"
        - text: "def ask(base_url, model, prompt, png_bytes): b64 = base64.b64encode(png_bytes).decode() body = { \"model\": model, \"messages\": [{ \"role\": \"user\", \"content\": [ {\"type\": \"text\", \"text\": prompt}, {\"type\": \"image_url\", \"image_url\": {\"url\": f\"data:image/png;base64,{b64}\"}}, ], }], \"max_tokens\": 1024, \"temperature\": 0.1, } ..."
      - paragraph [ref=f2e92]:
        - text: The same function, called with a file path instead of a screencap, works for every screenshot, photo, and PDF page I throw at it. When Claude needs to read a long screenshot or describe an image, the right behavior is to call
        - code [ref=f2e93]: thor-ask --file path/to/image.png "describe this in detail"
        - text: and get a paragraph back in under two seconds, not to consume vision tokens against a frontier API for the same job.
      - 'heading "thor-vid: Watch the Video So You Don''t Have To" [level=2] [ref=f2e94]'
      - paragraph [ref=f2e95]:
        - text: The second tool is
        - code [ref=f2e96]: thor-vid
        - text: . This is the one that actually saved me from the AYN Thor YouTube spiral.
      - paragraph [ref=f2e97]:
        - text: You hand it a URL or a local file. It runs
        - code [ref=f2e98]: yt-dlp
        - text: to pull the audio and the video, sends the audio to Whisper for a timestamped transcript, samples frames at a configurable cadence, and asks the vision model to describe each frame in a single sentence. The output is a merged markdown report with the transcript and the scene captions interleaved on the same timeline.
      - code [ref=f2e100]:
        - generic [ref=f2e101]: thor-vid, full pipeline
        - text: "$ thor-vid \"https://www.youtube.com/watch?v=<ayn-thor-setup-video>\" \\ --frames-per-min 6 [yt-dlp ok: 12m04s, 1080p] [whisper 38.2s -> 184 segments] [frame sample every 10s -> 73 frames] [vl 41.7s -> 73 captions] wrote ~/.agents/scratch/thor-vid/ayn-thor-setup/summary.md"
      - paragraph [ref=f2e102]: The merged file looks like a screenplay. Every transcript chunk sits next to a one-line description of what's actually on screen, which means a model summarizing the file gets the visual context it needs without watching anything. Claude reads the markdown the same way it would read a blog post, and it can pull the answer out of a twelve-minute video in seconds.
      - code [ref=f2e104]:
        - generic [ref=f2e105]: summary.md, excerpt
        - text: "[00:01:12 - 00:01:25] host: \"First thing I do on a new Thor is replace the launcher with ES-DE, because the stock one doesn't deal with the bottom screen well.\" scene: Stock AYN launcher visible on top screen, Settings app open on bottom screen, finger tapping \"Apps\". [00:01:26 - 00:01:39] host: \"Long-press the home button, hit 'Set as default home', pick ES-DE.\" scene: Android home selector dialog with \"ES-DE\" and \"AYN Launcher\" options, cursor over \"ES-DE\"."
      - paragraph [ref=f2e106]: The runtime, on a single 5090, lands around twice the wall-clock duration of the source video (a 12-minute clip takes roughly two minutes, dominated by the frame caption pass). Multiply that by the ten videos I would have watched to set up the Thor and the trade is obvious. The frontier-token equivalent of the same work, with vision-token pricing on every frame, would have been comically expensive.
      - figure "One CLI, one node, one report. yt-dlp pulls the media, ffmpeg splits audio and frames, Whisper and the VL model run in parallel, a small script merges by timestamp." [ref=f2e107]:
        - 'img "thor-vid pipeline: yt-dlp splits a video into audio and frames, Whisper transcribes audio, Qwen2.5-VL captions frames, both streams merge into a single timestamped markdown report." [ref=f2e108]':
