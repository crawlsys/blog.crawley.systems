        - link "the LiteLLM PyPI compromise" [ref=f4e36] [cursor=pointer]:
          - /url: /posts/litellm-supply-chain-attack.html
        - text: in March. The cadence is monthly now.
      - paragraph [ref=f4e37]: "I'll walk through the attack chain, the three pnpm settings you should turn on today (with the rough equivalents for npm, Bun, and Yarn), and then the bigger question: why I think you should start pulling your dependencies into source control, the way Meta and Google have been doing for fifteen years."
      - 'heading "The Attack Chain: Three Boring Mistakes Stacked Together" [level=2] [ref=f4e38]'
      - paragraph [ref=f4e39]: How does a project with maintainer 2FA, signed commits, and SLSA provenance end up publishing 84 malicious versions in six minutes? By chaining three mistakes that every public GitHub Actions monorepo probably has at least one of.
      - figure "// the three-stage trust chain — none of these are zero-days" [ref=f4e40]:
        - 'img "TanStack attack chain: pwn request, cache poisoning, OIDC theft." [ref=f4e41]':
