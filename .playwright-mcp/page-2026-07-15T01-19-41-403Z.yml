          - generic [ref=f4e199]: public registry
          - generic [ref=f4e200]: mutable, unaudited
          - generic [ref=f4e201]: →
          - generic [ref=f4e203]: node_modules/
          - generic [ref=f4e204]: VENDORED (META PATTERN)
          - generic [ref=f4e206]: your repo
          - generic [ref=f4e207]: + third-party/
          - generic [ref=f4e208]: →
          - generic [ref=f4e210]: reviewed diff at upgrade
          - generic [ref=f4e211]: human eyes on the bytes
          - generic [ref=f4e212]: →
          - generic [ref=f4e214]: build (offline)
          - generic [ref=f4e215]: no network for deps
          - generic [ref=f4e216]: →
          - generic [ref=f4e218]: artifact
      - paragraph [ref=f4e220]:
        - text: Inside Meta's monorepo, third-party dependencies don't live in a
        - code [ref=f4e221]: node_modules/
        - text: resolved at install time from a public registry. They live as checked-in source code in
        - code [ref=f4e222]: third-party/
        - text: ", reviewed when they were first added, diffed when they're upgraded, owned by humans whose names are in the OWNERS file. When a CVE drops in a package, an engineer opens a diff against the vendored copy in the monorepo, reviews it, and lands it. The build does not talk to npm. The build talks to the monorepo."
      - paragraph [ref=f4e223]:
        - text: This sounds extreme until you realize it's how Linux, Go, and most large Rust projects already operate. Go pushed the industry back toward vendoring a decade ago with
        - code [ref=f4e224]: go mod vendor
        - text: . Rust has
        - code [ref=f4e225]: cargo vendor
        - text: . The Linux kernel vendors. The JavaScript ecosystem is the outlier here, not the rule, and the cadence of registry compromises is making that look like the unforced error it always was.
      - generic [ref=f4e226]:
        - generic [ref=f4e227]: Vendoring is not a silver bullet
        - paragraph [ref=f4e228]:
          - text: If you vendor
          - code [ref=f4e229]: "@tanstack/react-router"
          - text: on May 10 and then bump the vendored copy on May 11 by blindly re-running an import script against npm, you pull the malicious version straight into your repo. The defense is the
          - emphasis [ref=f4e230]: review step
          - text: ": someone looks at the diff, sees a 30,000-line obfuscated"
          - code [ref=f4e231]: router_init.js
          - text: that was not there yesterday, and rejects the bump. That review only happens if vendoring is structured as "manually approved import," not "git-add the new
          - code [ref=f4e232]: node_modules/
          - text: ." Treat the upgrade as the security event, not the install.
      - paragraph [ref=f4e233]: "What vendoring actually buys you:"
      - list [ref=f4e234]:
        - listitem [ref=f4e235]:
          - strong [ref=f4e236]: Diff-time review.
          - text: Every dependency upgrade is a PR with real code in it. A 2.3 MB obfuscated payload is wildly visible in a diff. It's invisible in a lockfile bump.
        - listitem [ref=f4e237]:
          - strong [ref=f4e238]: Reproducible builds without registry trust.
          - text: Your build doesn't need npm to be up, honest, or uncompromised. The code is in your repo. You can rebuild from a five-year-old commit on an air-gapped network.
        - listitem [ref=f4e239]:
          - strong [ref=f4e240]: CVE response without panic.
          - text: When the next compromise hits — and there will be one within weeks — you grep your vendored tree, patch the vendored copy, and ship. No archaeology over "did our lockfile resolve to the bad version last Tuesday."
        - listitem [ref=f4e241]:
          - strong [ref=f4e242]: Forced minimalism.
          - text: When adding a dependency means "I commit 40 MB to the repo and own its security forever," people stop pulling in
          - code [ref=f4e243]: is-odd
          - text: as a transitive of a transitive.
      - paragraph [ref=f4e244]:
        - text: The tooling is workable.
        - link "Yarn Berry's Zero-Installs" [ref=f4e245] [cursor=pointer]:
          - /url: https://yarnpkg.com/features/zero-installs
        - text: mode commits the resolved tree into the repo. pnpm has
        - code [ref=f4e246]: pnpm fetch
        - text: and offline mirrors. For non-trivial projects, you write a small script that re-vendors from a private mirror at upgrade time and runs a diff against the previous tree. It isn't glamorous. It's also not hard.
      - paragraph [ref=f4e247]:
        - text: I'm starting to do this on my own projects this week. The package managers aren't evil — pnpm in particular is doing the right thing with the v11 defaults — but I no longer trust the registry-to-build path as a primitive.
        - link "LiteLLM in March" [ref=f4e248] [cursor=pointer]:
          - /url: /posts/litellm-supply-chain-attack.html
        - text: ","
        - link "Bitwarden CLI in April" [ref=f4e249] [cursor=pointer]:
          - /url: /posts/bitwarden-cli-supply-chain-defense.html
        - text: ", TanStack and Mistral yesterday. The pattern is constant and the cadence is accelerating."
      - heading "What to Do This Week" [level=2] [ref=f4e250]
      - list [ref=f4e251]:
        - listitem [ref=f4e252]:
          - strong [ref=f4e253]: Grep your lockfiles against the IOC list.
          - text: TanStack's postmortem, StepSecurity, and Snyk all publish package-and-version IOCs. If you find a hit, rotate every credential reachable from the affected install host — npm tokens, GitHub PATs, AWS keys, kubeconfigs, Vault tokens, SSH keys, the lot.
        - listitem [ref=f4e254]:
          - strong [ref=f4e255]: Upgrade to pnpm 11 today.
          - text: Set
          - code [ref=f4e256]: "minimumReleaseAge: 4320"
          - text: ","
          - code [ref=f4e257]: "strictDepBuilds: true"
          - text: ", write your"
          - code [ref=f4e258]: allowBuilds
          - text: . If you can't move to pnpm 11, set
          - code [ref=f4e259]: ignore-scripts=true
          - text: in
          - code [ref=f4e260]: .npmrc
          - text: and add a CI step that fails on packages younger than your threshold.
        - listitem [ref=f4e261]:
          - strong [ref=f4e262]:
            - text: Audit your
            - code [ref=f4e263]: pull_request_target
            - text: workflows.
          - text: Anywhere you check out PR code with base-repo permissions, you have a Pwn Request waiting. Drop to
          - code [ref=f4e264]: pull_request
          - text: ", or gate execution on"
          - code [ref=f4e265]: github.event.pull_request.head.repo.full_name == github.repository
          - text: .
        - listitem [ref=f4e266]:
          - strong [ref=f4e267]: Stop trusting GitHub Actions cache for security-bearing inputs.
          - text: The cache key namespace is shared between forks and base. Treat anything coming out of
          - code [ref=f4e268]: actions/cache
          - text: as attacker-controlled.
        - listitem [ref=f4e269]:
          - strong [ref=f4e270]: Scope your npm publish tokens narrowly.
          - text: Trusted-publisher OIDC tokens scoped to a single package, not a personal token with org-wide write. The TanStack token could publish anything under the scope.
        - listitem [ref=f4e271]:
          - strong [ref=f4e272]: Start the vendoring conversation.
          - text: Not next quarter. This week. Pick one critical dependency, vendor it as a pilot, get the muscle.
      - heading "The Trust Pivot" [level=2] [ref=f4e273]
      - paragraph [ref=f4e274]: "The npm and PyPI registries have been the most consequential pieces of infrastructure in software engineering for fifteen years, and they were built on a trust model that no longer fits the threat model. The model was: the maintainer is a real person, the package they publish is the code they wrote, the registry hands it to you faithfully. Each of those three legs has been broken on camera in the last six months. Maintainer machines get owned (LiteLLM). Maintainer publish credentials get stolen from their own CI (TanStack). Lookalike packages get published into the same namespace as the real ones."
      - paragraph [ref=f4e275]:
        - text: The defenses we've been bolting on — provenance, signing, 2FA on publish — assumed the failure happens before publish. The TanStack attack happened
        - emphasis [ref=f4e276]: at
        - text: "publish, with valid provenance and a valid token, and they all failed open. The pnpm v11 defaults are the right kind of pivot: less \"verify upstream is good\" and more \"assume upstream is bad and minimize what code execution costs me.\" That framing has to be the new baseline. Wait before you install. Don't run scripts you didn't allowlist. Don't accept code from anywhere but the registry. Don't trust the registry to be uncompromised. And, increasingly, don't trust the registry to be in the build path at all — vendor what you depend on, review the diffs, own the code."
      - paragraph [ref=f4e277]: None of this is free. The whole point of npm was that it was free. The bill on that has been arriving in twenty-minute publish windows roughly once a month, and you pay it in incident response hours, credential rotations, and customer-facing apologies. The cheapest version of paying it is the boring one. Turn on the three settings. Write the allowlist. Start moving the dependencies you actually depend on into your own repo.
