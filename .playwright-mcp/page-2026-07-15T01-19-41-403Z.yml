          - generic [ref=f4e50]: bundle-size.yml
          - generic [ref=f4e51]: "trigger: pull_request_target"
          - generic [ref=f4e52]: checks out PR tree
          - generic [ref=f4e53]: runs pnpm install (base perms)
          - generic [ref=f4e55]: STAGE 2 / CACHE
          - generic [ref=f4e56]: 1.1 GB poisoned cache
          - generic [ref=f4e57]: key matches release.yml
          - generic [ref=f4e58]: saved, waits 8 hours
          - generic [ref=f4e59]: STAGE 3 / OIDC THEFT
          - generic [ref=f4e61]: Maintainer pushes to main
          - generic [ref=f4e62]: release.yml fires
          - generic [ref=f4e63]: actions/cache restore
          - generic [ref=f4e64]: poisoned tree loaded
          - generic [ref=f4e66]: Runner.Worker memdump
          - generic [ref=f4e67]: scan /proc/*/cmdline
          - generic [ref=f4e68]: read process memory
          - generic [ref=f4e69]: extract OIDC publish token
          - generic [ref=f4e71]: npm publish x84
          - generic [ref=f4e72]: 19:20 - 19:26 UTC
          - generic [ref=f4e73]: 42 packages
          - generic [ref=f4e74]: valid SLSA provenance
      - paragraph [ref=f4e76]:
        - text: The first mistake was the
        - code [ref=f4e77]: pull_request_target
        - text: trigger on a workflow that ran untrusted fork code. That's the
        - link "classic Pwn Request" [ref=f4e78] [cursor=pointer]:
          - /url: https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
        - text: pattern, and it gave the attacker code execution with base-repo permissions just by opening a PR. The second mistake was trusting the GitHub Actions cache as if it were namespaced. It isn't. A poisoned cache from a fork-triggered run sits in the same key space as the cache the release pipeline restores, and the release pipeline restored it.
      - paragraph [ref=f4e79]:
        - text: The third mistake is the one that should worry every npm maintainer reading this. When
        - code [ref=f4e80]: release.yml
        - text: ran with the poisoned cache loaded, the attacker's binaries scanned
        - code [ref=f4e81]: /proc/*/cmdline
        - text: for the GitHub Actions
        - code [ref=f4e82]: Runner.Worker
        - text: process, dumped its memory, and pulled out the short-lived OIDC token that npm uses to authenticate publishes. They then published directly to the registry, bypassing the workflow's own publish step entirely. Because the token was valid and freshly minted, the malicious versions came with
        - emphasis [ref=f4e83]: valid SLSA provenance
        - text: .
      - generic [ref=f4e84]:
        - generic [ref=f4e85]: SLSA provenance did not save you here
        - paragraph [ref=f4e86]: If your supply chain story is "we only install packages with verified provenance," this attack walked through that. The token doing the publish was the real publisher's token. The build attestation was real. The compromise happened inside the trusted CI environment, with the trusted credential, in the trusted pipeline. Provenance is useful, but it is not a stand-alone control.
      - paragraph [ref=f4e87]:
        - text: "The payload itself is exactly what you'd expect: a ~2.3 MB obfuscated"
        - code [ref=f4e88]: router_init.js
        - text: that runs at install time, vacuums AWS keys, GCP service account JSON, kubeconfigs, Vault tokens, GitHub PATs, npm tokens, SSH keys, and shell history off the host, then exfiltrates over the Session Protocol CDN and GitHub's own GraphQL API to blend with normal CI traffic. The
        - link "Semgrep" [ref=f4e89] [cursor=pointer]:
          - /url: https://semgrep.dev/blog/2026/tanstack-router-packages-hit-by-coordinated-supply-chain-attack/
        - text: ","
        - link "StepSecurity" [ref=f4e90] [cursor=pointer]:
          - /url: https://www.stepsecurity.io/blog/mini-shai-hulud-is-back-a-self-spreading-supply-chain-attack-hits-the-npm-ecosystem
        - text: ", and"
        - link "Wiz" [ref=f4e91] [cursor=pointer]:
          - /url: https://www.wiz.io/blog/mini-shai-hulud-strikes-again-tanstack-more-npm-packages-compromised
        - text: writeups all dig into the payload mechanics if you want the deep dive.
      - heading "What Would Have Saved You on the Consumer Side" [level=2] [ref=f4e92]
      - paragraph [ref=f4e93]:
        - text: "The publisher-side fixes are TanStack's problem, and they've already shipped them: kill"
        - code [ref=f4e94]: pull_request_target
        - text: ", scope OIDC tokens narrowly, isolate the release runner. The question for the rest of us is simpler. If you'd run"
        - code [ref=f4e95]: pnpm install
        - text: at 19:23 UTC on May 11, what configuration would have spared you the breach?
      - paragraph [ref=f4e96]:
        - text: The answer is a small set of package manager settings that have existed for a while and that almost nobody had turned on. pnpm 11 (
        - link "released April 28, 2026" [ref=f4e97] [cursor=pointer]:
          - /url: https://pnpm.io/blog/releases/11.0
        - text: ", two weeks before the TanStack publish) flipped most of them on by default. If you're still on pnpm 10, or on npm or Yarn, you have to opt in. Do it today."
      - heading [level=3] [ref=f4e98]:
        - text: "1."
        - code [ref=f4e99]: minimumReleaseAge
        - text: — let other people get owned first
      - paragraph [ref=f4e100]:
        - text: The single highest-value setting in pnpm 11 is
        - code [ref=f4e101]: minimumReleaseAge
        - text: . It refuses to resolve any version of any package that was published less than N minutes ago. The pnpm 11 default is
        - code [ref=f4e102]: "1440"
        - text: ", or 24 hours."
      - code [ref=f4e104]:
        - generic [ref=f4e105]: pnpm-workspace.yaml
        - text: "# Refuse versions published in the last 3 days. # Bump to 10080 for a one-week delay if you can stomach it. minimumReleaseAge: 4320 # Escape hatch: dependencies you trust to install immediately. # Use sparingly. Anything in here is *not* protected. minimumReleaseAgeExclude: - \"@my-org/*\""
      - paragraph [ref=f4e106]:
        - text: This is not clever. It's just patience. The TanStack payload was live for about 20 minutes before external detection, and the bad versions were yanked within hours. Anyone running
        - code [ref=f4e107]: "minimumReleaseAge: 1440"
        - text: never resolved the malicious versions, because by the time their lockfile was allowed to bump, the bad versions were gone.
      - paragraph [ref=f4e108]: Every modern registry compromise has the same shape. The attacker publishes. Somebody notices. The registry yanks. The window where the bad version is the latest version is almost always under 24 hours. The one-week setting is better, and the only thing it costs you is a week of not having the new features — which you weren't going to ship to production this week anyway.
      - heading [level=3] [ref=f4e109]:
        - text: "2."
        - code [ref=f4e110]: strictDepBuilds
        - text: +
        - code [ref=f4e111]: allowBuilds
        - text: — kill install-time execution
      - paragraph [ref=f4e112]: This is the setting that shuts down most install-time payloads, including the TanStack one, on the consumer side. Postinstall scripts and native build steps are where the malicious code runs. If your package manager refuses to run those scripts unless you've explicitly allowlisted the package, the payload never executes.
      - code [ref=f4e114]:
        - generic [ref=f4e115]: pnpm-workspace.yaml
        - text: "# Fail the install if any transitive dep wants to run a build script # that isn't explicitly allowed. Hard gate, not a warning. strictDepBuilds: true # The ONLY packages allowed to run install-time scripts. # Everything else is a silent no-op. allowBuilds: - \"esbuild\" - \"@swc/core\" - \"sharp\" - \"node-gyp\""
      - paragraph [ref=f4e116]:
        - text: pnpm 10 disabled postinstall scripts by default and printed a warning.
        - code [ref=f4e117]: strictDepBuilds
        - text: "upgrades the warning to a hard failure: if any package in your tree wants to run a build script and isn't in"
        - code [ref=f4e118]: allowBuilds
        - text: ", the install errors out and tells you which package. You then make a deliberate choice to allow it, or you don't, and the package installs without its scripts ever firing."
      - paragraph [ref=f4e119]: For the overwhelming majority of npm packages, "doesn't execute its install scripts" is functionally identical to "does execute them" — those scripts are no-ops, telemetry pings, or unnecessary native builds. The packages that genuinely need install-time builds (native bindings, ABI shims) are a short, well-known list. Allowlist them by hand and revisit the list when you add a real dependency.
      - heading [level=3] [ref=f4e120]:
        - text: "3."
        - code [ref=f4e121]: blockExoticSubdeps
        - text: — close the git/tarball back door
      - paragraph [ref=f4e122]:
        - text: This one isn't tied to the TanStack incident, but it's the next hole. npm and pnpm both let a dependency declare its own dependencies as git URLs or arbitrary tarball URLs. A package you trust can transitively pull in
        - code [ref=f4e123]: "{\"some-helper\": \"git+https://github.com/random-person/lib.git#main\"}"
        - text: ", and that \"package\" is whatever the URL serves today."
      - code [ref=f4e125]:
        - generic [ref=f4e126]: pnpm-workspace.yaml
        - text: "# Refuse transitive deps that aren't on the registry. # Default in pnpm 11. Set it explicitly anyway so it's auditable. blockExoticSubdeps: true # Bonus: refuse silent trust downgrades. trustPolicy: \"no-downgrade\""
      - paragraph [ref=f4e127]: Every incident report I read ends with a footnote about "three more packages doing weird things with git URLs." Cut it off at the package manager. The registry is the only ingress.
      - heading "Minimum pnpm config, copy-pasteable" [level=3] [ref=f4e128]
      - code [ref=f4e130]:
        - generic [ref=f4e131]: pnpm-workspace.yaml — the bare minimum
        - text: "minimumReleaseAge: 4320 # 3 days minimumReleaseAgeExclude: - \"@my-org/*\" strictDepBuilds: true blockExoticSubdeps: true trustPolicy: \"no-downgrade\" allowBuilds: # add only what your build actually requires - \"esbuild\""
      - heading "What About npm, Bun, and Yarn?" [level=2] [ref=f4e132]
      - paragraph [ref=f4e133]: "pnpm is ahead of the field on this, but every package manager has at least a partial answer. The shape of the controls is the same everywhere: turn off install scripts globally, allowlist what you actually need, and gate by publish age either in the package manager or in CI."
      - figure "// matrix of supply-chain controls across package managers (May 2026)" [ref=f4e134]:
