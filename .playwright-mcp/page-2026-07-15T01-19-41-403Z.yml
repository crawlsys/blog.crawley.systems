      - paragraph [ref=f4e175]:
        - text: For npm, the simplest move is
        - code [ref=f4e176]: ignore-scripts=true
        - text: in
        - code [ref=f4e177]: .npmrc
        - text: at every repo root, plus a CI gate that lints the lockfile against publish-age timestamps before
        - code [ref=f4e178]: npm ci
        - text: . Socket, Snyk, and StepSecurity all ship this as a pipeline policy. For Bun, set an empty
        - code [ref=f4e179]: trustedDependencies
        - text: array in
        - code [ref=f4e180]: package.json
        - text: and revisit it the first time a real install errors out. For Yarn 4, flip
        - code [ref=f4e181]: enableScripts
        - text: off in
        - code [ref=f4e182]: .yarnrc.yml
        - text: .
      - 'heading "The Bigger Pivot: Pull Your Dependencies Into Source Control" [level=2] [ref=f4e183]'
      - paragraph [ref=f4e184]:
        - text: The settings above buy you time and remove the easiest exploit primitive. They do not solve the underlying problem. Every
        - code [ref=f4e185]: pnpm install
        - text: is still an unaudited code drop from a public registry into your build. Every CI run, every developer laptop, every container build. You have no idea what changed between yesterday's lockfile and today's beyond the version numbers. The lockfile pins a hash. It does not pin a diff.
      - paragraph [ref=f4e186]: Want to see what the alternative looks like? It's what Meta has been doing for fifteen years.
      - figure "// two trust models for the same install step" [ref=f4e187]:
        - img "Registry-resolved vs vendored dependency flow." [ref=f4e188]:
          - generic [ref=f4e190]: REGISTRY-RESOLVED (TODAY)
          - generic [ref=f4e192]: your repo
          - generic [ref=f4e193]: →
          - generic [ref=f4e195]: pnpm install
          - generic [ref=f4e196]: at build time
