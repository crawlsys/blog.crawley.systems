        - link "SafeDep" [ref=f4e34] [cursor=pointer]:
          - /url: https://safedep.io/mass-npm-supply-chain-attack-tanstack-mistral/
        - text: tallies 170+ npm packages and 404 malicious versions across both ecosystems. The threat actor is
        - strong [ref=f4e35]: TeamPCP
