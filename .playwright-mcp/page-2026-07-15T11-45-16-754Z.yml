        - paragraph [ref=f5e124]:
          - strong [ref=f5e125]: Why this is the sufficiency example.
          - text: "One working token established CONFIRMED. The first (uncurated) run burned cycles guessing dozens more tokens after the pattern was already obvious. The curated rule is: one PoC = stop enumerating."
        - paragraph [ref=f5e126]:
          - strong [ref=f5e127]: "Remediation sketch:"
          - text: require auth or short-lived signed URLs; rate-limit and monitor; never return full PII packages to an unauthenticated surface; treat list endpoints that reveal share tokens as sensitive.
