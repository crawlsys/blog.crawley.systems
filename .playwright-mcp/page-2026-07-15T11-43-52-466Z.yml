      - heading "What PentAGI Is, and What Broke" [level=2] [ref=f1e87]
      - paragraph [ref=f1e88]:
        - text: If you haven't run it,
        - link "PentAGI" [ref=f1e89] [cursor=pointer]:
          - /url: https://github.com/vxcontrol/pentagi
        - text: is a popular open-source autonomous-pentest system — high teens of thousands of GitHub stars, covered by Help Net Security as a multi-agent framework that plans and executes assessments in Docker. Community threads treat it as one of the more complete "simulated firm" stacks rather than a single ReAct loop. Popular, useful, praised. "Leading" is a marketing word I am not going to claim for anyone else's project.
      - paragraph [ref=f1e90]: "Architecturally it is straightforward: a planner breaks an objective into subtasks, an executor and pentester run tools inside sandboxed containers, a monitor periodically checks progress, and a reporter compiles findings. Each role is a prompt template driving whatever model you wire in."
      - paragraph [ref=f1e91]:
        - text: Upstream is pivoting toward a paid product — as they should; the tool is valuable. The open multi-agent pentest space is crowded for good reason. Adjacent projects I am watching (and will likely try and write up next) include
        - link "PentestGPT" [ref=f1e92] [cursor=pointer]:
          - /url: https://github.com/GreyDGL/PentestGPT
        - text: ","
        - link "Strix" [ref=f1e93] [cursor=pointer]:
          - /url: https://github.com/usestrix/strix
        - text: ", and"
        - link "CAI (Cybersecurity AI)" [ref=f1e94] [cursor=pointer]:
          - /url: https://github.com/aliasrobotics/cai
        - text: . The prompt-discipline lesson in this post is not PentAGI-specific.
      - paragraph [ref=f1e95]:
        - text: Pointed at GLM-5.2, PentAGI tested beautifully. The model reasoned about attack surface, chained tool calls, and wrote genuinely good findings. What it would not do is
        - emphasis [ref=f1e96]: conclude
        - text: . In that fifteen-hour run it kept probing a single vector long past the point of proof, never called the
        - code [ref=f1e97]: hack_result
        - text: tool that marks a subtask done, and so never advanced the plan or compiled the report. Ten findings on disk, zero subtasks closed, and a flow that would have run until I killed it.
      - paragraph [ref=f1e98]: The reflex diagnosis is "the model's too weak to know when it's finished." That's wrong, and the distinction is the entire point of this post.
      - 'heading "The Diagnosis: A Capable Model With No Stopping Rule" [level=2] [ref=f1e99]'
      - paragraph [ref=f1e100]: "GLM-5.2 does exactly what it's told, thoroughly, and it does not self-limit. The prompt templates were written for a model that quietly decides \"I have enough, move on.\" GLM-5.2 never makes that call on its own, so every soft edge in the prompts turned into an infinite grind. Five specific gaps did the damage:"
      - list [ref=f1e101]:
        - listitem [ref=f1e102]:
          - strong [ref=f1e103]: Buried completion instruction.
          - text: Closing a subtask depends on calling
          - code [ref=f1e104]: hack_result
          - text: ", but that instruction sat at the bottom of a long list. The model treated it as optional trivia, not the exit condition."
        - listitem [ref=f1e105]:
          - strong [ref=f1e106]: Too-soft self-check.
          - text: The periodic execution monitor asked "should I continue, or ask for help?" Given a genuine choice, a thorough model always picks continue.
        - listitem [ref=f1e107]:
          - strong [ref=f1e108]: No hard turn terminator.
          - text: Even when
          - code [ref=f1e109]: hack_result
          - text: did fire, it isn't a hard stop, so the agent kept emitting commands right past its own verdict.
        - listitem [ref=f1e110]:
          - strong [ref=f1e111]: Fuzzy subtask boundaries.
          - text: The planner sometimes bundled several attack vectors into one broad subtask with no clear finish line, which invited endless over-grinding.
        - listitem [ref=f1e112]:
          - strong [ref=f1e113]: No evidence-sufficiency rule.
          - text: With nothing telling it when proof was enough, it over-enumerated — at one point guessing more than forty portal tokens long after the pattern was obvious and one working example already settled the question.
      - paragraph [ref=f1e114]: None of these is a model deficiency. Every one is a missing instruction. The harness was written against an assumption the model doesn't satisfy.
      - 'heading "The Fix: Curate the Prompts to Stop and Decide" [level=2] [ref=f1e115]'
      - paragraph [ref=f1e116]:
        - text: "One rule for every change:"
        - strong [ref=f1e117]: test until you can make the CONFIRMED / NOT-CONFIRMED decision, then stop.
        - text: Decisiveness, not exhaustiveness. State the stopping rule instead of assuming the model carries it. That turned into four edits in
        - link [ref=f1e118] [cursor=pointer]:
          - /url: https://github.com/crawlsys/pentagi/tree/main/backend/pkg/templates/prompts
          - code [ref=f1e119]: backend/pkg/templates/prompts/
        - text: ":"
      - list [ref=f1e120]:
        - listitem [ref=f1e121]:
          - strong [ref=f1e122]: generator / refiner — atomic subtasks.
          - text: One vector per subtask. Never combine, never emit an umbrella "do X across all vectors" task. Broad subtasks create fuzzy finish lines; atomic ones have obvious ones. (
          - link "generator.tmpl" [ref=f1e123] [cursor=pointer]:
            - /url: https://github.com/crawlsys/pentagi/blob/main/backend/pkg/templates/prompts/generator.tmpl
          - text: )
        - listitem [ref=f1e124]:
          - strong [ref=f1e125]: task-assignment wrapper — close-out, yield, and sufficiency.
          - text: Test the vector, write the finding, call
          - code [ref=f1e126]: hack_result
          - text: ", then stop. Plus an evidence rule: one working proof-of-concept is CONFIRMED; a blocked primary path is NOT-CONFIRMED; stop enumerating once you can make that call. ("
          - link "task_assignment_wrapper.tmpl" [ref=f1e127] [cursor=pointer]:
            - /url: https://github.com/crawlsys/pentagi/blob/main/backend/pkg/templates/prompts/task_assignment_wrapper.tmpl
          - text: )
        - listitem [ref=f1e128]:
          - strong [ref=f1e129]: execution monitor — closure bias.
          - text: The periodic self-check now pushes decisively toward calling
          - code [ref=f1e130]: hack_result
          - text: and terminating, rather than offering "keep going" as an equal option. (
          - link "question_execution_monitor.tmpl" [ref=f1e131] [cursor=pointer]:
            - /url: https://github.com/crawlsys/pentagi/blob/main/backend/pkg/templates/prompts/question_execution_monitor.tmpl
          - text: )
        - listitem [ref=f1e132]:
          - strong [ref=f1e133]: pentester — report-first.
          - text: When findings exist and no report does, compile the report before running any more tests. (
          - link "pentester.tmpl" [ref=f1e134] [cursor=pointer]:
            - /url: https://github.com/crawlsys/pentagi/blob/main/backend/pkg/templates/prompts/pentester.tmpl
          - text: )
      - paragraph [ref=f1e135]:
        - text: "Write it down. Literally — the diffs are the product:"
        - link "FORK-NOTES.md" [ref=f1e136] [cursor=pointer]:
          - /url: https://github.com/crawlsys/pentagi/blob/main/FORK-NOTES.md
        - text: "on"
        - code [ref=f1e137]: main
        - text: .
