  - article [ref=f1e24]:
    - generic [ref=f1e25]:
      - paragraph [ref=f1e26]: We did pentesting running those weights locally — four DGX Sparks sitting on the desk.
      - paragraph [ref=f1e27]:
        - text: Open-weight
        - strong [ref=f1e28]: GLM-5.2
        - text: is what people put on the same benchmarks as Claude Sonnet and Opus for agentic coding. Buying the IQ only requires you sell your car — or a kidney, if the dealership already got the car — and budget for 600W of continuous power draw. No API bill. Client tokens never leave the house.
      - paragraph [ref=f1e29]: "Power and throughput, honestly:"
      - list [ref=f1e30]:
