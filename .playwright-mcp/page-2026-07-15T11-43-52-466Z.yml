        - listitem [ref=f1e34]:
          - strong [ref=f1e35]: "Decode:"
          - text: roughly
          - strong [ref=f1e36]: 20–30 tok/s
          - text: end-to-end for the agent loop — not chat-snappy, fine for hands-off work.
        - listitem [ref=f1e37]:
          - strong [ref=f1e38]: "Prefill shape:"
          - text: early recon is prefill-heavy (~
          - strong [ref=f1e39]: 60s
          - text: mean step). Late API probing is lighter (~
          - strong [ref=f1e40]: 20s
          - text: ). Same model; the workload changes the bill.
      - paragraph [ref=f1e41]:
        - text: Cloud GLM works with the same harness if you don't want the Sparks. This post is about a capable model meeting a harness that never defined "done." The first serious run wrote ten evidence-backed findings files and closed zero subtasks — fifteen hours, ~300 live API calls. The model was fine. The harness wasn't. Finishing the job took reshaping the system prompts; that fix is on
        - code [ref=f1e42]: main
        - text: at
        - link "crawlsys/pentagi" [ref=f1e43] [cursor=pointer]:
          - /url: https://github.com/crawlsys/pentagi
        - text: .
      - 'heading "The Stack: Near-Frontier Inference Without Leaving the Building" [level=2] [ref=f1e44]'
      - paragraph [ref=f1e45]:
        - text: The weights are GLM-5.2 served as the
        - link "QuantTrio Int4-Int8Mix" [ref=f1e46] [cursor=pointer]:
          - /url: https://huggingface.co/QuantTrio/GLM-5.2-Int4-Int8Mix
        - text: quant on a four-node DGX Spark cluster — vLLM (community DCP/MTP recipe below) behind litellm, one OpenAI-compatible URL for the agent.
      - paragraph [ref=f1e47]:
        - strong [ref=f1e48]: Quantization, briefly.
        - text: Full-precision weights for a model this size are an enormous memory footprint — more than four Sparks can hold while still leaving room for context and KV cache. Quantization stores most of those weights in fewer bits (here a mix of 4-bit and 8-bit) so the same parameters fit and move faster in memory, with a managed quality trade. You are packing a large model into the RAM you actually have, which is why the QuantTrio build shows up in every GB10 serving recipe for this class of model. Without that pack step, this class of intelligence stays in a hyperscaler.
      - paragraph [ref=f1e49]: "Everything above lives on-prem: target, agent orchestration, weights, KV cache, findings. For a pentest that matters more than any leaderboard number. A cloud agent ships your scope out with every tool call — client IPs, hostnames, request/response bodies, and the exploit paths it is testing. Local weights keep that traffic on the desk."
      - paragraph [ref=f1e50]:
        - text: "Serving credit where it is due: the path that stayed up under tool-calling load builds on"
        - link "tonyd2wild's QuantTrio / MTP / 4× Spark recipe" [ref=f1e51] [cursor=pointer]:
          - /url: https://github.com/tonyd2wild/GLM-5.2-655K-MTP-4x-DGX-Spark
        - text: . We forked it under
        - link "crawlsys/GLM-5.2-655K-MTP-4x-DGX-Spark" [ref=f1e52] [cursor=pointer]:
          - /url: https://github.com/crawlsys/GLM-5.2-655K-MTP-4x-DGX-Spark
        - text: with the extra landmines we hit (cutlass-dsl 4.6 bake, profiling-forward skip, parser flags, no-tmpfs weights) in
        - code [ref=f1e53]: EXTRA-NOTES.md
        - text: . Tony cracked the hangs; we wrote down the bruises.
