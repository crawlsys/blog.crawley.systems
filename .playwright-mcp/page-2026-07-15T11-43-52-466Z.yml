          - generic [ref=f1e201]: pentester
          - generic [ref=f1e202]: close-out + yield
          - generic [ref=f1e203]: report-first
          - generic [ref=f1e205]: monitor
          - generic [ref=f1e206]: closure bias
          - generic [ref=f1e207]: terminate decisively
          - generic [ref=f1e209]: reporter
          - generic [ref=f1e210]: compiles findings
          - generic [ref=f1e211]: once, at close
          - generic [ref=f1e212]: "evidence-sufficiency: one working PoC = CONFIRMED · blocked primary path = NOT-CONFIRMED · then stop"
          - generic [ref=f1e213]: "all edits: backend/pkg/templates/prompts/ on crawlsys/pentagi main"
      - heading "The Bigger Point" [level=2] [ref=f1e215]
      - paragraph [ref=f1e216]: Near-frontier inference at home is no longer a demo. Serving a model people compare to Sonnet and Opus off four GB10s would have read as fantasy a year ago. The bottleneck moved off the silicon and into the harness. The limits live in the orchestration prompts, not the wafer fab.
      - paragraph [ref=f1e217]:
        - text: If you are building agentic systems on capable local models — or on cloud GLM with the same harness — and the agent will not finish, do not reach for a bigger model first. Check whether you ever told it what "done" looks like. A model that does exactly what you ask will grind forever if you never wrote the stopping condition down.
        - link "Write it down." [ref=f1e218] [cursor=pointer]:
          - /url: https://github.com/crawlsys/pentagi/blob/main/backend/pkg/templates/prompts/task_assignment_wrapper.tmpl
      - paragraph [ref=f1e219]:
        - text: "One caveat: upstream PentAGI has slowed down — last commit about six weeks before the fork — which is part of why forking made sense, especially as they move toward paid offerings. And one of these fixes really belongs in the source, not the prompt layer. Making"
        - code [ref=f1e220]: hack_result
        - text: a hard turn-terminator is a change to the tool-execution loop; papering over it with prompt language works, but the durable fix lives in code. That one I'd like to send upstream if the project picks back up.
      - paragraph [ref=f1e221]:
        - text: "Curated prompts:"
        - link "crawlsys/pentagi" [ref=f1e222] [cursor=pointer]:
          - /url: https://github.com/crawlsys/pentagi
        - code [ref=f1e223]: main
        - text: "— star it if it saves you a fifteen-hour non-closing run. Serving recipe (Tony's base + the landmines we hit):"
