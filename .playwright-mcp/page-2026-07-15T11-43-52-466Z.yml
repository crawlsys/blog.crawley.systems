      - heading "The Payoff" [level=2] [ref=f1e173]
      - paragraph [ref=f1e174]:
        - text: "Same model, same cluster, curated prompts, clean start. This time the flow closed subtasks, advanced through every vector in the plan, and reached its report. Given distinct multi-class auth tokens (admin, limited, multi-org), it confirmed issues the first run never proved: unauthenticated PII via long-lived share tokens, a missing rate limit and permission gate on an MCP-style endpoint, and a latent stored-XSS path that stayed NOT-CONFIRMED as a primary exploit but was real code-level risk. Intelligence was never the missing piece. Permission to"
        - strong [ref=f1e175]: stop and decide
        - text: was.
      - generic [ref=f1e176]:
        - generic [ref=f1e177]: Sample findings (anonymized report)
        - paragraph [ref=f1e178]: I published a fully anonymized, styled report of the engagement as an unlisted page — no client name, no real hostnames, no personal data. Use it as the "what did it actually find?" companion to this post.
        - paragraph [ref=f1e179]:
          - link "Read the sample report" [ref=f1e180] [cursor=pointer]:
            - /url: /posts/reports/autonomous-pentest-sample.html
        - paragraph [ref=f1e181]: "Highlights from the closed run:"
        - paragraph [ref=f1e182]:
          - strong [ref=f1e183]: High — portal share tokens return full PII without auth or rate limits
          - text: (
          - link "details" [ref=f1e184] [cursor=pointer]:
            - /url: /posts/reports/autonomous-pentest-sample.html#finding-portal-token
          - text: ). One working token proved the class; the sufficiency rule stopped the forty-token guessing spiral.
        - paragraph [ref=f1e185]:
          - strong [ref=f1e186]: "Medium — MCP-style endpoint: no rate limit, no permission gate"
          - text: (
          - link "details" [ref=f1e187] [cursor=pointer]:
            - /url: /posts/reports/autonomous-pentest-sample.html#finding-mcp-rate
          - text: ). 20/20 rapid requests all 200; a zero-permission principal still got through.
        - paragraph [ref=f1e188]:
          - strong [ref=f1e189]: Positive results count too
          - text: — cross-tenant IDOR primary path blocked by server-derived org; RS256/JWKS held against forgery; upload MIME/size bounds enforced at presign (
          - link "details" [ref=f1e190] [cursor=pointer]:
            - /url: /posts/reports/autonomous-pentest-sample.html#positives
          - text: ).
      - paragraph [ref=f1e191]: "Favorite ops detail: mid-engagement I had to move the Sparks. Full tilt they run hot enough that you want gloves if you're carrying one more than half a minute, and my teenage son had a fair point that parking four of them in his closet to spread household power load was a bad roommate move. Working data lived on a persistent volume, so nothing was lost — once GLM-5.2 came back up the flow auto-resumed. You can pick the inference cluster up mid-pentest and put it somewhere with better airflow. Try that with a cloud dependency."
      - 'figure "Each curated prompt maps to one agent role. The evidence-sufficiency rule ties them together: prove it once, make the call, move on." [ref=f1e192]':
        - img "Where each curated prompt lives in the PentAGI multi-agent flow" [ref=f1e193]:
